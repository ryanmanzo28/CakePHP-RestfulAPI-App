server {
    listen 80;
    server_name _;
    absolute_redirect off;
    root /var/www/html/api/webroot;
    index index.php index.html;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Deny hidden files
    location ~ /\.|^.*\.ini$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Serve assets directly from the `app/` folder
    location ^~ /assets/ {
        alias /var/www/html/app/assets/;
        expires 0;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ =404;
    }

    # Serve pages under /pages/ from app/pages/
    location ^~ /pages/ {
        alias /var/www/html/app/pages/;
        index index.html;
        expires 0;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ =404;
    }

    # Serve site root from app/main.html
    location = /main.html {
    alias /var/www/html/app/main.html;
    expires max;
    add_header Cache-Control "public";
}

    # Serve top-level main.html from app/ (not app/pages)
    

    # Also serve top-level HTML pages (e.g. /dashboard.html) from app/pages/
    location ~* ^/(?:pages/)?(.+\.html)$ {
        alias /var/www/html/app/pages/$1;
        expires max;
        add_header Cache-Control "public";
    }

    # Serve top-level JS file from app
    location = /main.js {
        alias /var/www/html/app/main.js;
        expires 0;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = / {
        return 302 $scheme://$http_host/main.html;
    }

    # Fallback to CakePHP front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM handling
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Static extensions (development: disable long caching)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|json)$ {
        expires 0;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ =404;
    }
}
