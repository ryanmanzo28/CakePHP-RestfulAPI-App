version: '3.8'

services:
  app:
    build: .
    image: cakephp-rest-api-app
    container_name: cakephp_app
    volumes:
      - ./:/var/www/html:cached
    environment:
      - APP_ENV=production
      - JWT_SECRET=${JWT_SECRET:-change_me}
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-cakephp}
      - DB_USER=${DB_USER:-cakeuser}
      - DB_PASS=${DB_PASS:-secret}
    depends_on:
      - db

  web:
    image: nginx:stable-alpine
    container_name: cakephp_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: cakephp_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-cakephp}
      MYSQL_USER: ${DB_USER:-cakeuser}
      MYSQL_PASSWORD: ${DB_PASS:-secret}
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
