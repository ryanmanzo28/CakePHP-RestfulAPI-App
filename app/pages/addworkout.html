<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Add Workout — HydraCor</title>
    <link rel="stylesheet" href="../assets/main.css?v=4">
  </head>
  <body class="cw-add-workout">
    <header class="dashboard-header">
      <div class="dashboard-header-inner">
        <div class="brand"><div class="logo" aria-hidden="true"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="20" height="20" rx="6" /><path d="M7 12h10M7 16h6" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div><h1 class="dashboard-title">HydraCor</h1><div class="tag">Add Workout</div></div></div>
        <div class="dashboard-actions">
          <div class="user-info small">Signed in as <strong id="username"></strong></div>
          <button id="logout" class="btn secondary">Logout</button>
        </div>
      </div>
    </header>

    <main class="cw-container">
      <div class="cw-card">
        <div class="cw-right">
          <form id="cwForm" class="cw-form" novalidate>
            <div class="cw-header">
              <div class="cw-title-block">
                <label for="title" class="cw-label">Title</label>
                <input id="title" name="title" class="cw-input" placeholder="Workout title" required>
              </div>
              <div class="cw-clock-inline" style="position:relative">
                <svg id="cwClock" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" tabindex="0" role="slider" aria-label="Duration selector" aria-valuemin="0" aria-valuemax="720" aria-valuenow="45">
                  <defs>
                    <filter id="glass" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="4" result="b"/></filter>
                  </defs>
                  <g transform="translate(110,110)">
                    <circle r="56" class="cw-face" />
                    <g id="cwTicks"></g>
                    <g id="cwArc"></g>
                    <g id="cwHandle" transform="rotate(-90)">
                      <line class="cw-handle-line" x1="52" y1="0" x2="70" y2="0" stroke-linecap="round"/>
                      <circle class="cw-handle-dot" cx="70" cy="0" r="5" />
                      <!-- larger invisible hit area for easier dragging -->
                      <circle class="cw-handle-hit" cx="70" cy="0" r="18" fill="transparent"></circle>
                    </g>
                    <circle r="36" class="cw-glass" filter="url(#glass)"></circle>
                  </g>
                </svg>
                <div class="cw-center-display" id="cwDurationDisplay">45m</div>
              </div>
            </div>

            <div class="cw-grid">
              <div class="field"><label class="cw-label">Date</label><input id="date" type="date" class="cw-input"></div>
              <div class="field"><label class="cw-label">Type</label><select id="type" class="cw-input"><option>Strength</option><option>Cardio</option><option>Running</option><option>Climbing</option><option>Mobility</option><option>Yoga</option><option>Other</option></select></div>
              <div id="cwTypeFields" class="field"></div>
              <div class="field"><label class="cw-label">Sets</label><input id="sets" type="number" min="1" value="3" class="cw-input"></div>
              <div class="field"><label class="cw-label">Notes</label><input id="notes" type="text" placeholder="Optional notes" class="cw-input"></div>
            </div>

            <div class="cw-exercises">
              <div class="cw-ex-header"><h4>Exercises</h4><button type="button" id="cwAddEx" class="btn small">Add</button></div>
              <div id="cwExercisesList" class="cw-ex-list"></div>
            </div>

            <div style="display:flex;gap:8px;align-items:center;margin-top:6px">
              <div style="margin-left:auto;font-size:12px;color:var(--muted)">Tip: press <strong>Ctrl/Cmd+Enter</strong> to submit</div>
            </div>

            <div id="cwPreview" class="cw-preview" aria-live="polite" style="margin-top:12px"></div>
            <div id="cwChanges" class="small muted" style="margin-top:8px"></div>

            <input id="durationField" type="hidden" name="duration">
            <div class="cw-actions"><div id="cwError" class="error"></div><button class="btn primary" type="submit">Save Workout</button></div>
          </form>
        </div>
      </div>
    </main>

    <script src="../main.js"></script>
    <script>
    (function(){
      // basic auth redirect
      const token = localStorage.getItem('jwt')||'';
      if(!token) { window.location.href='/pages/login.html'; return; }
      document.getElementById('username').textContent = localStorage.getItem('username')||'';
      document.getElementById('logout').addEventListener('click', ()=>{ localStorage.removeItem('jwt'); localStorage.removeItem('username'); window.location.href='/pages/login.html'; });

      // exercises
      const exList = document.getElementById('cwExercisesList');
      let loadedWorkoutWeightUnit = null;
      let currentWeightUnit = (window.getWeightUnit ? window.getWeightUnit() : localStorage.getItem('hc:weightUnit')) || 'lb';
      const exerciseSuggestions = ['Squat','Bench Press','Deadlift','Pull-up','Push-up','Overhead Press','Row','Lunge','Plank','Burpee','Sprint','Cycling'];
      // create datalist for suggestions
      const dl = document.createElement('datalist'); dl.id = 'exSuggestions'; exerciseSuggestions.forEach(s=>{ const o = document.createElement('option'); o.value = s; dl.appendChild(o); }); document.body.appendChild(dl);
      function normalizeUnit(unit){ return unit === 'kg' ? 'kg' : 'lb'; }
      function formatConvertedInputWeight(value, sourceUnit, targetUnit){
        if (value === null || value === undefined || value === '') return '';
        if (window.convertWeightValue) {
          const converted = window.convertWeightValue(value, sourceUnit, targetUnit);
          if (converted !== null) {
            return Math.abs(converted - Math.round(converted)) > 0.05 ? converted.toFixed(1) : String(Math.round(converted));
          }
        }
        return String(value);
      }
      function getSelectedWeightUnit(){
        const weightUnitEl = document.getElementById('weightUnit');
        return normalizeUnit((weightUnitEl && weightUnitEl.value) || currentWeightUnit || 'lb');
      }
      function updateWeightInputMetadata(unit){
        Array.from(exList.querySelectorAll('.ex-weight')).forEach((input) => {
          input.placeholder = `Weight (${unit})`;
          input.setAttribute('aria-label', `Weight in ${unit}`);
        });
      }
      function convertExerciseWeightInputs(fromUnit, toUnit){
        const normalizedFrom = normalizeUnit(fromUnit);
        const normalizedTo = normalizeUnit(toUnit);
        Array.from(exList.querySelectorAll('.ex-weight')).forEach((input) => {
          if (input.value !== '') {
            input.value = formatConvertedInputWeight(input.value, normalizedFrom, normalizedTo);
          }
        });
        updateWeightInputMetadata(normalizedTo);
      }
      function addExercise(data, sourceWeightUnit){
        const row = document.createElement('div'); row.className = 'cw-ex-row';
        const n = document.createElement('input'); n.className = 'ex-name'; n.placeholder = 'Exercise name'; n.setAttribute('list','exSuggestions'); n.value = (data && data.name) ? data.name : ''; n.setAttribute('aria-label','Exercise name');
        const r = document.createElement('input'); r.className = 'ex-reps'; r.type = 'number'; r.placeholder = 'Reps'; r.value = (data && data.reps) ? data.reps : ''; r.setAttribute('aria-label','Reps');
        row.append(n, r);
        // if current type is Strength, add weight input
        const curType = (document.getElementById('type') || {}).value || '';
        if (curType === 'Strength') {
          const targetWeightUnit = getSelectedWeightUnit();
          const initialWeight = (data && data.weight !== undefined && data.weight !== null && data.weight !== '')
            ? formatConvertedInputWeight(data.weight, sourceWeightUnit || loadedWorkoutWeightUnit || targetWeightUnit, targetWeightUnit)
            : '';
          const w = document.createElement('input'); w.className = 'ex-weight'; w.type = 'number'; w.step = '0.5'; w.placeholder = `Weight (${targetWeightUnit})`; w.value = initialWeight; w.setAttribute('aria-label', `Weight in ${targetWeightUnit}`); row.appendChild(w);
        }
        const rem = document.createElement('button'); rem.type = 'button'; rem.className = 'btn small'; rem.textContent = 'Remove'; rem.setAttribute('aria-label','Remove exercise'); rem.addEventListener('click', () => { row.remove(); updatePreview(); });
        row.appendChild(rem);
        exList.appendChild(row);
        // focus the new exercise name for quick entry
        n.focus();

        // Enter adds new exercise from name or reps
        n.addEventListener('keydown', function(e){ if(e.key === 'Enter'){ e.preventDefault(); addExercise(); } });
        r.addEventListener('keydown', function(e){ if(e.key === 'Enter'){ e.preventDefault(); addExercise(); } });
        // update preview on input changes
        [n, r].concat(Array.from(row.querySelectorAll('.ex-weight'))).forEach(i=>i.addEventListener('input', updatePreview));
      }
      document.getElementById('cwAddEx').addEventListener('click', ()=>addExercise());

      // dynamic type-specific fields
      const typeEl = document.getElementById('type');
      const typeFields = document.getElementById('cwTypeFields');
      function renderTypeFields(t) {
        typeFields.innerHTML = '';
        // default: show exercises
        const exSection = document.querySelector('.cw-exercises');
        if (!exSection) return;
        exSection.style.display = '';
        if (!t) return;
        if (t === 'Cardio' || t === 'Running') {
          // distance input for runs/cardio
          const lbl = document.createElement('label'); lbl.className = 'cw-label'; lbl.textContent = 'Distance (km)';
          const inp = document.createElement('input'); inp.id = 'distance'; inp.type = 'number'; inp.step = '0.01'; inp.className = 'cw-input'; inp.placeholder = 'Distance in kilometers';
          typeFields.append(lbl, inp);
          // hide exercises for pure cardio runs
          exSection.style.display = 'none';
        } else if (t === 'Strength') {
          // ensure exercises visible and sets visible; weight inputs will be added on addExercise
          document.getElementById('sets').closest('.field').style.display = '';
          // add weight unit selector
          const lblU = document.createElement('label'); lblU.className='cw-label'; lblU.textContent='Weight unit';
          const sel = document.createElement('select'); sel.id='weightUnit'; sel.className='cw-input'; ['kg','lb'].forEach(u=>{ const o=document.createElement('option'); o.value=u; o.textContent=u; sel.appendChild(o); });
          // preselect user preference if available
          try{ const pref = normalizeUnit(window.getWeightUnit ? window.getWeightUnit() : localStorage.getItem('hc:weightUnit')); if(pref) { sel.value = pref; currentWeightUnit = pref; } }catch(e){}
          sel.addEventListener('change', function(){ const nextUnit = normalizeUnit(this.value); const prevUnit = currentWeightUnit; currentWeightUnit = nextUnit; convertExerciseWeightInputs(prevUnit, nextUnit); try{ if(window.setWeightUnit) window.setWeightUnit(nextUnit); else localStorage.setItem('hc:weightUnit', nextUnit); }catch(e){} updatePreview(); });
          typeFields.appendChild(lblU); typeFields.appendChild(sel);
          updateWeightInputMetadata(currentWeightUnit);
        } else {
          // other types: keep default fields
        }
      }
      typeEl.addEventListener('change', function(){ renderTypeFields(this.value); });
      // initialize type fields now
      renderTypeFields(typeEl.value);

      // clock logic (snaps to 5min, max 12h / 720min)
      const svg = document.getElementById('cwClock');
      const ticks = svg.querySelector('#cwTicks');
      const arc = svg.querySelector('#cwArc');
      const handle = svg.querySelector('#cwHandle');
      const display = document.getElementById('cwDurationDisplay');
      const durationField = document.getElementById('durationField');
      let dragging = false;
      let angle = -90;
      const MAX_MINS = 720; // 12 hours
      // inline clock radius (matches SVG small version)
      const CLOCK_R = 56;
      function polar(r, deg) { const a = deg * Math.PI / 180; return { x: r * Math.cos(a), y: r * Math.sin(a) }; }
      function drawTicks() {
        ticks.innerHTML = '';
        for (let i = 0; i < 60; i++) {
          const ang = -90 + i * 6;
          const o = polar(CLOCK_R - 8, ang);
          const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          dot.setAttribute('cx', o.x);
          dot.setAttribute('cy', o.y);
          // larger dots every 15 minutes, medium every 5 minutes, small otherwise
          const r = (i % 15 === 0) ? 3.2 : (i % 5 === 0) ? 2.0 : 0.9;
          dot.setAttribute('r', r);
          dot.setAttribute('class', 'cw-dot');
          ticks.appendChild(dot);
        }
      }
      function drawArc(a) {
        const r = CLOCK_R;
        let end = a;
        while (end < -90) end += 360;
        while (end > 270) end -= 360;
        const start = -90;
        const startP = polar(r, start);
        const endP = polar(r, end);
        const large = (end - start) > 180 ? 1 : 0;
        arc.innerHTML = `<path class="cw-arc" d="M ${startP.x} ${startP.y} A ${r} ${r} 0 ${large} 1 ${endP.x} ${endP.y}"></path>`;
      }
      function angleToMins(a){ let s=(a+90)%360; if(s<0) s+=360; let mins=Math.round(s*2); mins = Math.min(MAX_MINS, Math.round(mins/5)*5); return mins; }
      function minsToDisplay(m){ if(m>=60){ const h=Math.floor(m/60); const mm=m%60; return mm?`${h}h${mm}m`:`${h}h`; } return `${m}m` }
      function setAria(mins){ svg.setAttribute('aria-valuenow', String(mins)); svg.setAttribute('aria-valuetext', minsToDisplay(mins)); }
      function update(a){
        angle = a;
        handle.setAttribute('transform', `rotate(${a})`);
        drawArc(a);
        const mins = angleToMins(a);
        display.textContent = minsToDisplay(mins);
        // store numeric minutes for API submission
        durationField.value = String(mins);
        setAria(mins);
      }

      // animate the handle to a target angle
      function animateToAngle(target){ const start=angle; const diff=(target-start); const dur=180; const startTs=performance.now(); function step(ts){ const t=Math.min(1,(ts-startTs)/dur); const eased = 1 - Math.pow(1-t,3); const cur = start + diff*eased; update(cur); if(t<1) requestAnimationFrame(step); else update(target); } requestAnimationFrame(step); }
      function pageAngle(x,y){ const r=svg.getBoundingClientRect(); const cx=r.left+r.width/2; const cy=r.top+r.height/2; return Math.atan2(y-cy,x-cx)*180/Math.PI; }
      svg.addEventListener('mousedown', e=>{ dragging=true; update(pageAngle(e.clientX,e.clientY)); }); window.addEventListener('mousemove', e=>{ if(dragging) update(pageAngle(e.clientX,e.clientY)); }); window.addEventListener('mouseup', ()=>{ if(dragging){ // snap to nearest and animate
        const snapped = angleToMins(angle); const target = (snapped/2) - 90; animateToAngle(target); }
      dragging=false; });
      svg.addEventListener('touchstart', e=>{ dragging=true; const t=e.touches[0]; update(pageAngle(t.clientX,t.clientY)); e.preventDefault(); }); window.addEventListener('touchmove', e=>{ if(dragging){ const t=e.touches[0]; update(pageAngle(t.clientX,t.clientY)); } }); window.addEventListener('touchend', ()=>{ // on touch end snap
        const snapped = angleToMins(angle); const target = (snapped/2) - 90; animateToAngle(target); dragging=false; });
      // keyboard controls
      svg.addEventListener('keydown', function(e){ const step=5; let mins = angleToMins(angle); if(e.key==='ArrowUp' || e.key==='ArrowRight'){ mins = Math.min(MAX_MINS, mins + step); e.preventDefault(); } else if(e.key==='ArrowDown' || e.key==='ArrowLeft'){ mins = Math.max(0, mins - step); e.preventDefault(); } else if(e.key==='PageUp'){ mins = Math.min(MAX_MINS, mins + 15); e.preventDefault(); } else if(e.key==='PageDown'){ mins = Math.max(0, mins - 15); e.preventDefault(); } else if(e.key==='Home'){ mins = 0; e.preventDefault(); } else if(e.key==='End'){ mins = MAX_MINS; e.preventDefault(); } else { return; } const target = (mins/2) - 90; animateToAngle(target); });
      // mouse wheel
      svg.addEventListener('wheel', function(e){ e.preventDefault(); const delta = Math.sign(e.deltaY); let mins = angleToMins(angle); mins = Math.max(0, Math.min(MAX_MINS, mins + (delta>0?-5:5))); const target = (mins/2) - 90; animateToAngle(target); });

      // inline editable duration (double-click) and +/- buttons
      function parseDurationInput(v){ v = v.trim(); if(!v) return null; if(v.includes(':')){ const parts=v.split(':').map(p=>parseInt(p,10)||0); const mins = parts.length===2? parts[0]*60 + parts[1] : parts[0]; return Math.max(0, Math.min(MAX_MINS, mins)); } const n=parseInt(v,10); if(isNaN(n)) return null; return Math.max(0, Math.min(MAX_MINS, n)); }
      function showInlineEditor(){ const rect=display.getBoundingClientRect(); const input=document.createElement('input'); input.type='text'; input.value=display.textContent.replace(/h/,'h ').replace(/m/,'m'); input.style.position='fixed'; input.style.left=(rect.left)+'px'; input.style.top=(rect.top - 4)+'px'; input.style.zIndex=9999; input.style.width=(rect.width+40)+'px'; input.style.padding='6px 8px'; input.style.borderRadius='8px'; input.style.border='1px solid rgba(0,0,0,0.12)'; document.body.appendChild(input); input.focus(); input.select(); function finish(){ const v=input.value.trim(); const mins = parseDurationInput(v.replace(/h/,' ').replace(/m/,' ').replace(/␀/g,'')); document.body.removeChild(input); if(mins!==null){ const target = (mins/2) - 90; animateToAngle(target); } }
      input.addEventListener('blur', finish); input.addEventListener('keydown', function(e){ if(e.key==='Enter'){ finish(); } else if(e.key==='Escape'){ document.body.removeChild(input); } }); }
      display.addEventListener('dblclick', showInlineEditor);
      // remove +/- buttons; make handle hit-area cursor and center double-click interactive
      const handleHit = svg.querySelector('.cw-handle-hit');
      if(handleHit){ handleHit.style.cursor = 'grab'; handleHit.addEventListener('mousedown', function(){ handleHit.style.cursor='grabbing'; }); window.addEventListener('mouseup', function(){ handleHit.style.cursor='grab'; }); }
      drawTicks(); update(-90 + 45/2);

      // If we're editing an existing workout, prefill the form from sessionStorage
      function parseDurationString(s){ if(!s) return 0; s = String(s); const h = (s.match(/(\d+)\s*h/)||[])[1] || 0; const m = (s.match(/(\d+)\s*m/)||[])[1] || 0; if(h||m) return (parseInt(h,10)||0)*60 + (parseInt(m,10)||0); const n = parseInt(s,10); return isNaN(n)?0:n; }
      const rawSelected = sessionStorage.getItem('hc:selectedWorkout');
      let _originalSelected = null; // keeps original loaded workout for change detection
      if(rawSelected){
        try{
          const sel = JSON.parse(rawSelected);
          _originalSelected = JSON.parse(JSON.stringify(sel));
          // populate basic fields
          if(sel.title) document.getElementById('title').value = sel.title;
          if(sel.date) document.getElementById('date').value = sel.date;
          if(sel.notes) document.getElementById('notes').value = sel.notes || '';
          // duration may be stored as number minutes or a string like '1h15m'
          let durationM = 0;
          if(sel.duration !== undefined && sel.duration !== null){
            if(typeof sel.duration === 'number') durationM = Math.max(0, Math.floor(sel.duration));
            else durationM = parseDurationString(sel.duration);
          } else if(sel.data && sel.data.duration){ durationM = parseDurationString(sel.data.duration); }
          if(durationM){ durationField.value = String(durationM); const target = (durationM/2) - 90; animateToAngle(target); }
          // type and type-specific fields
          const typeVal = (sel.type) || (sel.data && sel.data.type) || document.getElementById('type').value;
          if(typeVal){ document.getElementById('type').value = typeVal; renderTypeFields(typeVal); }
          // sets
          if(sel.sets !== undefined && sel.sets !== null) { try{ document.getElementById('sets').value = String(sel.sets); }catch(e){} }
          // distance
          if(sel.distance !== undefined && (document.getElementById('distance')||{}).id){ try{ document.getElementById('distance').value = sel.distance; }catch(e){} }
          loadedWorkoutWeightUnit = (sel.data && sel.data.weightUnit) || sel.weightUnit || null;
          // exercises: clear current list and add from data
          const exData = (sel.data && Array.isArray(sel.data.exercises)) ? sel.data.exercises : (Array.isArray(sel.exercises)? sel.exercises : []);
          exList.innerHTML = '';
          if(Array.isArray(exData) && exData.length){
            for(const ex of exData){ addExercise(ex, loadedWorkoutWeightUnit); }
          } else {
            // no exercises in selected workout — keep one empty row
            addExercise();
          }
          // ensure preview updated
          updatePreview();
          // keep `hc:selectedWorkout` until the user saves or cancels so submit knows edit mode
        }catch(e){ console.warn('Failed to parse selected workout', e); addExercise(); }
      } else {
        // add one empty exercise by default
        addExercise();
      }

      // submit
      // preview helper
      function updatePreview(){
        const title = document.getElementById('title').value.trim();
        const type = document.getElementById('type').value;
        const date = document.getElementById('date').value;
        const durationM = parseInt(durationField.value||'0',10)||0;
        const dist = (document.getElementById('distance')||{}).value||'';
        const selectedWeightUnit = (document.getElementById('weightUnit')||{}).value || '';
        const weightUnit = selectedWeightUnit || (window.getWeightUnit ? window.getWeightUnit() : localStorage.getItem('hc:weightUnit')) || 'lb';
        const exs = Array.from(exList.children).map(r=>{
          const name = (r.querySelector('.ex-name')||{value:''}).value;
          const reps = (r.querySelector('.ex-reps')||{value:0}).value;
          const weightEl = r.querySelector('.ex-weight');
          const weight = weightEl ? (weightEl.value || '') : '';
          return { name, reps, weight };
        });
        const preview = document.getElementById('cwPreview');
        preview.innerHTML = `<strong>${title||'Untitled'}</strong> • ${type} ${date? '• '+date : ''} ${durationM? '• '+(durationM+'m') : ''}` + (dist? ` • ${dist}km` : '');
        if (exs.length) {
          const ul = document.createElement('ul'); ul.style.margin='8px 0 0'; exs.slice(0,5).forEach(e=>{ const li=document.createElement('li'); li.textContent = `${e.name} ${e.reps? '• '+e.reps+' reps':''}` + (e.weight ? ` • ${e.weight}${weightUnit}` : ''); ul.appendChild(li); }); preview.appendChild(ul);
        }
        // enable submit only when title and either duration>0 or distance provided
        const btn = document.querySelector('#cwForm button[type=submit]');
        if (btn) btn.disabled = !(title && (durationM>0 || dist));

        // compute and display changed fields if editing
        const changesEl = document.getElementById('cwChanges');
        try{
          const rawSel = sessionStorage.getItem('hc:selectedWorkout');
          if(rawSel){
            const sel = JSON.parse(rawSel);
            const diff = computeChanges(sel, { title, date, duration: durationM, notes: (document.getElementById('notes')||{}).value || '', type, sets: parseInt((document.getElementById('sets')||{}).value||'0',10)||0, distance: dist || null, weightUnit: (document.getElementById('weightUnit')||{}).value || null, exercises: exs });
            if(diff.changed && diff.changed.length) {
              changesEl.textContent = 'Changes: ' + diff.changed.join(', ');
            } else { changesEl.textContent = ''; }
          } else { if(changesEl) changesEl.textContent = ''; }
        }catch(e){ if(changesEl) changesEl.textContent = ''; }
      }

      // computeChanges: returns { changed: [fields], values: {field: value} }
      function computeChanges(orig, cur){
        const changed = [];
        const values = {};
        if(!orig) return { changed: [], values: {} };
        function normStr(v){ return v===null||v===undefined? '': String(v); }
        if(normStr(orig.title) !== normStr(cur.title)){ changed.push('title'); values.title = cur.title; }
        if(normStr(orig.date) !== normStr(cur.date)){ changed.push('date'); values.date = cur.date; }
        if(normStr(orig.notes) !== normStr(cur.notes)){ changed.push('notes'); values.notes = cur.notes; }
        // duration: compare minutes
        const origDur = (orig.duration!==undefined && orig.duration!==null) ? (typeof orig.duration==='number'? orig.duration : parseDurationString(orig.duration)) : (orig.data && orig.data.duration? parseDurationString(orig.data.duration) : 0);
        const curDur = Number(cur.duration||0);
        if(Number(origDur) !== Number(curDur)){ changed.push('duration'); values.duration = curDur; }
        // type
        const origType = orig.type || (orig.data && orig.data.type) || '';
        if(normStr(origType) !== normStr(cur.type)){ changed.push('type'); values.type = cur.type; }
        // sets
        const origSets = (orig.sets !== undefined && orig.sets !== null) ? Number(orig.sets) : (orig.data && orig.data.sets ? Number(orig.data.sets) : 0);
        if(Number(origSets) !== Number(cur.sets)){ changed.push('sets'); values.sets = cur.sets; }
        // distance
        const origDist = (orig.distance !== undefined && orig.distance !== null) ? Number(orig.distance) : (orig.data && orig.data.distance ? Number(orig.data.distance) : null);
        const curDist = cur.distance !== null && cur.distance !== undefined && cur.distance !== '' ? Number(cur.distance) : null;
        if((origDist || 0) !== (curDist || 0)) { changed.push('distance'); values.distance = curDist; }
        // weightUnit
        const origWU = (orig.data && orig.data.weightUnit) || orig.weightUnit || null;
        if((origWU||'') !== (cur.weightUnit||'')){ changed.push('weightUnit'); values.weightUnit = cur.weightUnit; }
        // exercises: deep compare by normalized array
        const normEx = function(arr){ if(!Array.isArray(arr)) return []; return arr.map(e=>({ name: String(e.name||'').trim(), reps: Number(e.reps||0)||0, weight: (e.weight===undefined||e.weight===null)? null : Number(e.weight||0) })); };
        const oEx = normEx((orig.data && orig.data.exercises) || orig.exercises || []);
        const cEx = normEx(cur.exercises || []);
        const exSame = (oEx.length === cEx.length) && oEx.every((oe, i) => oe.name === cEx[i].name && oe.reps === cEx[i].reps && ( (oe.weight===null && cEx[i].weight===null) || oe.weight === cEx[i].weight ));
        if(!exSame){ changed.push('exercises'); values.exercises = cEx; }
        return { changed, values };
      }

      document.getElementById('cwForm').addEventListener('input', updatePreview);

      

      // Ctrl/Cmd+Enter to submit
      document.addEventListener('keydown', function(e){ if ((e.ctrlKey||e.metaKey) && e.key === 'Enter') { e.preventDefault(); document.getElementById('cwForm').dispatchEvent(new Event('submit',{cancelable:true})); } });

      document.getElementById('title').focus();

      document.getElementById('cwForm').addEventListener('submit', async function(ev){
        ev.preventDefault();
        document.getElementById('cwError').textContent = '';
        const title = document.getElementById('title').value.trim();
        if (!title) { document.getElementById('cwError').textContent = 'Please enter a title'; return; }
        const date = document.getElementById('date').value;
        const notes = document.getElementById('notes').value;
        const type = document.getElementById('type').value;
        const sets = parseInt(document.getElementById('sets').value || '0', 10) || 0;
        const exercises = [];
        for (const r of Array.from(exList.children)) {
          const name = (r.querySelector('.ex-name') || { value: '' }).value.trim();
          const reps = parseInt((r.querySelector('.ex-reps') || { value: '0' }).value || '0', 10) || 0;
          const weightEl = r.querySelector('.ex-weight');
          const weight = weightEl ? (parseFloat(weightEl.value) || 0) : undefined;
          if (name) {
            const ex = { name, reps };
            if (weightEl) ex.weight = weight;
            exercises.push(ex);
          }
        }
        // if cardio/running, include distance
        const distanceEl = document.getElementById('distance');
        const distance = distanceEl ? (distanceEl.value ? parseFloat(distanceEl.value) : null) : null;
        const weightUnit = (document.getElementById('weightUnit')||{}).value || 'kg';
        const durationM = parseInt(durationField.value || '0', 10) || 0;
        const btn = this.querySelector('button[type=submit]'); btn.disabled = true; btn.textContent = 'Saving…';
        try {
          // if editing an existing workout, prefer update flow
          const rawSel = sessionStorage.getItem('hc:selectedWorkout');
          if (rawSel) {
            const sel = JSON.parse(rawSel);
            // compute only changed fields to send
            const diff = computeChanges(sel, { title, date, duration: durationM, notes, type, sets, exercises, distance, weightUnit });
            if(!diff.changed || !diff.changed.length){
              // nothing changed
              try{ sessionStorage.removeItem('hc:selectedWorkout'); }catch(e){}
              window.location.href = '/pages/dashboard.html';
              return;
            }
            const payload = Object.assign({}, diff.values);
            const updated = await window.updateWorkout(sel.id || sel._id || sel._local_id || sel.localId || sel.uuid, payload);
            // clear selected marker to avoid accidental re-edit
            try{ sessionStorage.removeItem('hc:selectedWorkout'); }catch(e){}
            window.location.href = '/pages/dashboard.html';
          } else {
            const created = await window.addWorkout({ title, date, duration: durationM, notes, type, sets, exercises, distance, weightUnit });
            try {
              // store a merged optimistic object so dashboard can render details even if server returns minimal object
              const saved = Object.assign({}, created || {}, { title, date, duration: durationM, notes, type, sets, exercises, distance, weightUnit });
              // only mark as local when client generated a local id
              saved._local = String(saved.id || '').startsWith('local-');
              if (saved._local) {
                sessionStorage.setItem('hc:newWorkout', JSON.stringify(saved));
              } else {
                sessionStorage.removeItem('hc:newWorkout');
              }
            } catch (e) { /* ignore */ }
            window.location.href = '/pages/dashboard.html';
          }
        } catch (e) {
          document.getElementById('cwError').textContent = e && e.message ? e.message : 'Save failed';
        } finally {
          btn.disabled = false; btn.textContent = 'Save Workout';
        }
      });
    })();
    </script>
  </body>
</html>
