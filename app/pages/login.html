<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>HydraCor Workout Tracker — Login</title>
        <link rel="preload" href="../assets/main.css?v=4" as="style">
        <link rel="preload" href="/main.js" as="script">
        <link rel="stylesheet" href="../assets/main.css?v=4" />
    </head>
    <body class="auth-page">
        <div class="login-wrapper">
            <main class="login-card" role="main" aria-labelledby="loginTitle">
                <header class="card-header">
                    <div class="logo" aria-hidden="true">
                        <svg width="42" height="42" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="2" y="2" width="20" height="20" rx="6" />
                            <path d="M7 12h10M7 16h6" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="card-title">
                        <h1 id="loginTitle">HydraCor</h1>
                        <p class="tag">Sign in to your account</p>
                    </div>
                </header>

                <form id="loginForm" class="login-form" autocomplete="on" novalidate>
                    <div class="field">
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email" required placeholder="you@example.com" autocomplete="username" />
                    </div>

                    <div class="field">
                        <label for="password">Password</label>
                        <input id="password" name="password" type="password" required placeholder="••••••••" autocomplete="current-password" />
                    </div>

                    <div class="row-between" style="margin-top:8px;">
                        <label class="small"><input type="checkbox" id="remember" /> Remember me</label>
                        <a class="small muted" href="#">Forgot?</a>
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn primary" aria-label="Sign in">Sign In</button>
                    </div>

                    <div id="loginError" role="alert" class="error" aria-live="polite"></div>
                </form>

                <div class="divider" aria-hidden="true"></div>
                <p class="help">New here? <a href="/pages/register.html">Create an account</a></p>
            </main>

            <footer class="login-footer">© 2026 HydraCor</footer>
        </div>

        <script src="/main.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const form = document.getElementById('loginForm');
                const err = document.getElementById('loginError');
                form.addEventListener('submit', async function (ev) {
                    ev.preventDefault();
                    err.textContent = '';
                    const email = document.getElementById('email').value.trim();
                    const password = document.getElementById('password').value;
                    try {
                        const normalizedEmail = email.toLowerCase();
                        // First try the hashed credential used by registration, then fall back to raw for legacy users.
                        const hashed = await hashPassword(password + normalizedEmail);

                        async function tryLogin(candidatePassword) {
                            const response = await fetch('/api/auth/login', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ email: normalizedEmail, password: candidatePassword }),
                            });
                            const payload = await response.json().catch(() => ({}));
                            return { response, payload };
                        }

                        let { response: res, payload: data } = await tryLogin(hashed);
                        if (!res.ok) {
                            ({ response: res, payload: data } = await tryLogin(password));
                        }

                        if (!res.ok) {
                            err.textContent = data.error || 'Invalid credentials';
                            return;
                        }

                        if (data.token) {
                            // Store JWT and the client-side SHA (used for legacy API requests)
                            localStorage.setItem('jwt', data.token);
                            localStorage.setItem('username', email);
                            localStorage.setItem('passwordHash', hashed);
                            // Redirect to dashboard page (same directory)
                            window.location.href = 'dashboard.html';
                        } else {
                            err.textContent = 'Login response missing token.';
                        }
                    } catch (e) {
                        err.textContent = e.message || 'Network error';
                    }
                });
            });
        </script>
    </body>
</html>
