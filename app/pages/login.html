<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>HydraCor Workout Tracker — Login</title>
        <link rel="stylesheet" href="../assets/main.css" />
    </head>
    <body>
        <div class="login-wrapper">
            <main class="login-card">
                <div class="brand">
                    <h1>HydraCor</h1>
                    <p class="tag">Workout Tracker</p>
                </div>

                <form id="loginForm" class="login-form" autocomplete="on">
                    <div class="field">
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email" required placeholder="you@example.com" />
                    </div>

                    <div class="field">
                        <label for="password">Password</label>
                        <input id="password" name="password" type="password" required placeholder="Your password" />
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn primary">Sign In</button>
                    </div>

                    <div id="loginError" role="alert" class="error" aria-live="polite"></div>
                </form>
            </main>
            <footer class="login-footer">© 2026 HydraCor</footer>
        </div>

        <script src="../main.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const form = document.getElementById('loginForm');
                const err = document.getElementById('loginError');
                form.addEventListener('submit', async function (ev) {
                    ev.preventDefault();
                    err.textContent = '';
                    const email = document.getElementById('email').value.trim();
                    const password = document.getElementById('password').value;
                    try {
                        // Compute client-side SHA-256 of password + normalized (lowercased) email, then send that value.
                        const hashed = await hashPassword(password + email.toLowerCase());
                        const res = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: email, password: hashed }),
                        });
                        const data = await res.json();
                        if (!res.ok) {
                            err.textContent = data.error || 'Login failed';
                            return;
                        }

                        if (data.token) {
                            // Store JWT and the client-side SHA (used for legacy API requests)
                            localStorage.setItem('jwt', data.token);
                            localStorage.setItem('username', email);
                            localStorage.setItem('passwordHash', hashed);
                            // Redirect to dashboard page (same directory)
                            window.location.href = 'dashboard.html';
                        } else {
                            err.textContent = 'Login response missing token.';
                        }
                    } catch (e) {
                        err.textContent = e.message || 'Network error';
                    }
                });
            });
        </script>
    </body>
</html>
