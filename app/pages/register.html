<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="/assets/main.css?v=4">
        <script src="/main.js" defer></script>
        <link rel="preload" href="/assets/main.css?v=4" as="style">
        <link rel="preload" href="/main.js" as="script">
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>HydraCor Workout Tracker - Register</title>
    </head>
    
    <body class="auth-page">
        <div class="login-wrapper">
            <main class="login-card" role="main" aria-labelledby="regTitle">
                <header class="card-header">
                    <div class="logo" aria-hidden="true">
                        <svg width="42" height="42" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <rect x="2" y="2" width="20" height="20" rx="6" />
                            <path d="M7 12h10M7 16h6" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="card-title">
                        <h1 id="regTitle">HydraCor</h1>
                        <p class="tag">Create your account</p>
                    </div>
                </header>

                <form id="registerForm" class="login-form" novalidate>
                    <div class="field">
                        <label for="username">Username</label>
                        <input id="username" name="username" type="text" required placeholder="your name" />
                    </div>

                    <div class="field">
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email" required placeholder="you@example.com" />
                    </div>

                    <div class="field">
                        <label for="password">Password</label>
                        <input id="password" name="password" type="password" required placeholder="Choose a strong password" />
                    </div>

                    <div class="actions">
                        <button id="registerBtn" type="submit" class="btn primary">Create Account</button>
                    </div>

                    <div id="registerError" role="alert" class="error" aria-live="polite"></div>
                </form>

                <div class="divider" aria-hidden="true"></div>
                <p class="help">Already have an account? <a href="/pages/login.html">Sign in</a></p>
            </main>

            <footer class="login-footer">© 2026 HydraCor</footer>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const form = document.getElementById('registerForm');
                const err = document.getElementById('registerError');
                const btn = document.getElementById('registerBtn');

                function setLoading(on) {
                    btn.disabled = on;
                    btn.textContent = on ? 'Creating…' : 'Create Account';
                    if (on) btn.classList.add('loading'); else btn.classList.remove('loading');
                }

                form.addEventListener('submit', async function (e) {
                    e.preventDefault();
                    err.textContent = '';
                    err.style.color = '';
                    const username = form.username.value.trim();
                    const email = form.email.value.trim();
                    const password = form.password.value;

                    if (!username || !email || !password) {
                        err.textContent = 'All fields are required.';
                        return;
                    }
                    if (password.length < 8) {
                        err.textContent = 'Password must be at least 8 characters.';
                        return;
                    }

                    try {
                        setLoading(true);
                        const result = await createAccount(username, email, password);
                        // show success briefly then redirect to login
                        err.style.color = 'green';
                        err.textContent = result.message || 'Account created — redirecting to sign in...';
                        setTimeout(() => {
                            window.location.href = '/pages/login.html';
                        }, 900);
                    } catch (error) {
                        console.error('createAccount error', error);
                        err.style.color = '';
                        if (error && error.message) {
                            err.textContent = error.message;
                        } else {
                            err.textContent = 'Failed to create account. Please try again.';
                        }
                    } finally {
                        setLoading(false);
                    }
                });
            });
        </script>
    </body>
</html>
