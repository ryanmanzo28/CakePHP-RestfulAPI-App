<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Past Workouts — HydraCor</title>
    <link rel="stylesheet" href="../assets/main.css?v=4">
  </head>
  <body class="dashboard-page">
    <header class="dashboard-header">
      <div class="dashboard-header-inner">
        <div class="brand"><div class="logo" aria-hidden="true"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="20" height="20" rx="6" /><path d="M7 12h10M7 16h6" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div><h1 class="dashboard-title">HydraCor</h1><div class="tag">Past Workouts</div></div></div>
        <div class="dashboard-actions">
          <div class="user-info small">Signed in as <strong id="username"></strong></div>
          <button id="backDash" class="btn secondary">Dashboard</button>
        </div>
      </div>
    </header>

    <main class="dashboard-content">
      <div class="dashboard-container dashboard-shell">
        <section class="dash-main-card">
          <header class="dash-section-head row-between">
            <h3>Activity Feed</h3>
            <div class="feed-head-actions">
              <select id="feedScope" class="cw-input" style="max-width:170px;min-width:130px;">
                <option value="all">All Activity</option>
                <option value="mine">My Posts</option>
                <option value="community">Community</option>
              </select>
              <span class="small muted" id="postCount">0 items</span>
            </div>
          </header>
          <p class="small muted feed-subtitle">See your completed posts and the wider community timeline.</p>
          <div id="postList" class="workout-list activity-feed-list"></div>
        </section>
      </div>
    </main>

    <div id="profileModal" class="modal-overlay" aria-hidden="true">
      <div class="modal-panel profile-modal-panel" role="dialog" aria-modal="true" aria-label="Profile overview">
        <button id="profileClose" class="btn small modal-close-btn">Close</button>
        <h2 id="profileTitle">Profile</h2>
        <div id="profileMeta" class="small muted"></div>
        <div id="profileStats" class="small muted" style="margin:8px 0 10px;"></div>
        <div id="profilePosts" class="profile-post-list"></div>
      </div>
    </div>

    <script src="../main.js"></script>
    <script>
    (function(){
      const token = (window.getAuthToken && window.getAuthToken()) || localStorage.getItem('jwt') || sessionStorage.getItem('jwt') || '';
      if(!token){ window.location.href = '/pages/login.html'; return; }

      const FEED_CACHE_TTL_MS = 60000;
      let communityFeedCache = [];
      let communityFeedFetchedAt = 0;
      let lastMergedItems = [];
      const dtf = new Intl.DateTimeFormat(undefined, { dateStyle: 'medium', timeStyle: 'short' });

      const usernameEl = document.getElementById('username');
      const backDashBtn = document.getElementById('backDash');
      const listEl = document.getElementById('postList');
      const countEl = document.getElementById('postCount');
      const feedScopeEl = document.getElementById('feedScope');
      const profileModalEl = document.getElementById('profileModal');
      const profilePostsEl = document.getElementById('profilePosts');
      const profileMetaEl = document.getElementById('profileMeta');
      const profileTitleEl = document.getElementById('profileTitle');
      const profileStatsEl = document.getElementById('profileStats');

      function setFeedLoading(isLoading){
        if(!listEl) return;
        if(!isLoading) return;
        const loading = document.createElement('div');
        loading.className = 'workout-card feed-card empty';
        loading.textContent = 'Loading activity feed...';
        listEl.replaceChildren(loading);
      }

      if (usernameEl) usernameEl.textContent = (window.getStoredUsername && window.getStoredUsername()) || localStorage.getItem('username') || sessionStorage.getItem('username') || '';
      if (backDashBtn) backDashBtn.addEventListener('click', function(){ window.location.href='/pages/dashboard.html'; });
      const profileClose = document.getElementById('profileClose');
      if (profileClose) profileClose.addEventListener('click', closeProfileModal);
      if (profileModalEl) {
        profileModalEl.addEventListener('click', function(ev){ if (ev.target === profileModalEl) closeProfileModal(); });
      }
      document.addEventListener('keydown', function(ev){ if(ev.key === 'Escape') closeProfileModal(); });

      async function loadCommunityFeed(forceRefresh){
        const useCache = !forceRefresh && communityFeedFetchedAt && (Date.now() - communityFeedFetchedAt < FEED_CACHE_TTL_MS);
        if (useCache) return communityFeedCache;
        const jwt = (window.getAuthToken && window.getAuthToken()) || localStorage.getItem('jwt') || sessionStorage.getItem('jwt') || '';
        if(!jwt) return [];
        try {
          const res = await fetch('/api/workouts/feed?limit=10000', {
            headers: {
              'Authorization': `Bearer ${jwt}`,
              'Accept': 'application/json'
            }
          });
          if(!res.ok) return [];
          const json = await res.json().catch(() => []);
          const next = Array.isArray(json) ? json : [];
          communityFeedCache = next;
          communityFeedFetchedAt = Date.now();
          return next;
        } catch (e) {
          return communityFeedCache;
        }
      }

      function parseWorkoutData(raw){
        if(!raw) return {};
        if(typeof raw === 'string'){
          try { return JSON.parse(raw); } catch (e) { return {}; }
        }
        return raw;
      }

      function getJwtPayload(){
        const jwt = (window.getAuthToken && window.getAuthToken()) || localStorage.getItem('jwt') || sessionStorage.getItem('jwt') || '';
        if(!jwt || jwt.indexOf('.') === -1) return null;
        try {
          const base64 = jwt.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
          const json = decodeURIComponent(atob(base64).split('').map(function(ch){
            return '%' + ('00' + ch.charCodeAt(0).toString(16)).slice(-2);
          }).join(''));
          return JSON.parse(json);
        } catch (e) {
          return null;
        }
      }

      function getCurrentIdentity(){
        const payload = getJwtPayload() || {};
        const rawUser = (window.getStoredUsername && window.getStoredUsername()) || localStorage.getItem('username') || sessionStorage.getItem('username') || '';
        const userName = String(rawUser || '').trim().toLowerCase();
        const userId = String(payload.sub || payload.user_id || '').trim();
        return { userName, userId };
      }

      function localPostBelongsToCurrentUser(post){
        if(!post || typeof post !== 'object') return false;
        const identity = getCurrentIdentity();
        const postOwnerId = String(post.ownerId || post.userId || '').trim();
        const postOwnerName = String(post.owner || '').trim().toLowerCase();

        if(identity.userId && postOwnerId) {
          return postOwnerId === identity.userId;
        }
        if(identity.userName && postOwnerName) {
          return postOwnerName === identity.userName;
        }

        // Legacy posts without ownership metadata are not considered account-safe.
        return false;
      }

      function isMineValue(value){
        if (value === true || value === 1) return true;
        if (typeof value === 'string') {
          const normalized = value.trim().toLowerCase();
          return normalized === '1' || normalized === 'true' || normalized === 'yes';
        }
        return false;
      }

      function normalizeLocalPosts(posts){
        return posts.map(p => ({
          id: p.id,
          kind: 'mine',
          sourceKind: 'local-post',
          createdAt: p.created || Date.now(),
          title: p.title || 'Completed Workout',
          owner: p.owner || ((window.getStoredUsername && window.getStoredUsername()) || localStorage.getItem('username') || sessionStorage.getItem('username') || 'You'),
          ownerId: p.ownerId || p.userId || 'me',
          workoutTitle: p.workoutTitle || '',
          summary: p.summary || {},
          activityType: p.activityType || '',
          intensity: p.intensity || '',
          description: p.description || '',
          notes: p.notes || '',
          photoDataUrl: p.photoDataUrl || '',
          source: p
        }));
      }

      function normalizeUserWorkouts(items){
        return items.map(it => {
          const data = parseWorkoutData(it.data);
          const created = it.created ? Date.parse(it.created) : (it.modified ? Date.parse(it.modified) : 0);
          return {
            id: `mine-${it.id}`,
            kind: 'mine',
            sourceKind: 'db-workout',
            createdAt: created || Date.now(),
            title: it.title || 'Workout',
            owner: (window.getStoredUsername && window.getStoredUsername()) || localStorage.getItem('username') || sessionStorage.getItem('username') || 'You',
            ownerId: 'me',
            workoutTitle: it.title || '',
            summary: {
              durationSeconds: 0,
              setsCompleted: data && data.sets ? Number(data.sets) : null,
              exercisesCompleted: Array.isArray(data.exercises) ? data.exercises.length : null
            },
            activityType: data && data.type ? data.type : '',
            intensity: '',
            description: '',
            notes: it.notes || '',
            photoDataUrl: '',
            source: Object.assign({}, it, { canEdit: true, isMine: true })
          };
        });
      }

      function normalizeCommunityFeed(items){
        return items.map(it => {
          const data = parseWorkoutData(it.data);
          const completionPost = data && data.completionPost && typeof data.completionPost === 'object' ? data.completionPost : {};
          const created = it.created ? Date.parse(it.created) : 0;
          const isMine = isMineValue(it.isMine);
          const title = completionPost.title || it.title || 'Workout';
          const description = completionPost.description || '';
          const notes = completionPost.notes || it.notes || '';
          const photoDataUrl = completionPost.photoDataUrl || '';
          return {
            id: `community-${it.id}`,
            kind: isMine ? 'mine' : 'community',
            sourceKind: 'community-workout',
            createdAt: created || Date.now(),
            title,
            owner: it.owner || 'Member',
            ownerId: it.user_id || null,
            workoutTitle: it.title || '',
            summary: {
              durationSeconds: 0,
              setsCompleted: data && data.sets ? Number(data.sets) : null,
              exercisesCompleted: Array.isArray(data.exercises) ? data.exercises.length : null
            },
            activityType: data && data.type ? data.type : '',
            intensity: completionPost.intensity || '',
            description,
            notes,
            photoDataUrl,
            source: Object.assign({}, it, { isMine })
          };
        });
      }

      function profileForItem(item){
        return {
          kind: item.kind,
          owner: item.owner || 'Member',
          ownerId: item.ownerId || null
        };
      }

      function openWorkoutDetail(item){
        if(!item || !item.source) return;
        const source = Object.assign({}, item.source, {
          canEdit: item.kind === 'mine' || !!item.source.isMine,
          feedKind: item.kind,
          owner: item.owner || item.source.owner || '',
          ownerId: item.ownerId || item.source.user_id || null
        });
        try {
          sessionStorage.setItem('hc:selectedWorkout', JSON.stringify(source));
          sessionStorage.setItem('hc:detailBackHref', '/pages/past_workouts.html');
        } catch (e) {}
        window.location.href = '/pages/workout_detail.html';
      }

      function itemsForProfile(profile){
        if(!profile) return [];
        if(profile.kind === 'mine'){
          return lastMergedItems.filter(i => i.kind === 'mine');
        }
        return lastMergedItems.filter(i => i.kind === 'community' && String(i.ownerId || '') === String(profile.ownerId || ''));
      }

      function closeProfileModal(){
        if(!profileModalEl) return;
        profileModalEl.classList.remove('open');
        profileModalEl.setAttribute('aria-hidden', 'true');
        try { document.body.classList.remove('modal-open'); } catch (e) {}
      }

      function openProfileModal(profile){
        if(!profileModalEl || !profilePostsEl || !profileTitleEl || !profileMetaEl || !profileStatsEl) return;
        const items = itemsForProfile(profile).slice().sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
        profileTitleEl.textContent = profile.owner || 'Profile';
        profileMetaEl.textContent = profile.kind === 'mine' ? 'Your activity profile' : 'Community member';
        profileStatsEl.textContent = `${items.length} post${items.length===1?'':'s'} in feed`;

        profilePostsEl.innerHTML = '';
        if(!items.length){
          const empty = document.createElement('div');
          empty.className = 'small muted';
          empty.textContent = 'No posts to show yet.';
          profilePostsEl.appendChild(empty);
        } else {
          items.slice(0, 8).forEach(item => {
            const row = document.createElement('div');
            row.className = 'profile-post-item';
            const title = document.createElement('div');
            title.className = 'profile-post-title';
            title.textContent = item.title || item.workoutTitle || 'Workout';
            row.appendChild(title);

            const meta = document.createElement('div');
            meta.className = 'small muted';
            meta.textContent = dtf.format(new Date(item.createdAt || Date.now()));
            row.appendChild(meta);

            const desc = item.description || item.notes || '';
            if(desc){
              const p = document.createElement('div');
              p.className = 'small profile-post-desc';
              p.textContent = desc;
              row.appendChild(p);
            }
            profilePostsEl.appendChild(row);
          });
        }

        profileModalEl.classList.add('open');
        profileModalEl.setAttribute('aria-hidden', 'false');
        try { document.body.classList.add('modal-open'); } catch (e) {}
      }

      async function renderPosts(opts){
        const options = opts || {};
        setFeedLoading(true);
        const scope = (feedScopeEl || {}).value || 'all';
        const community = await loadCommunityFeed(true);
        const normalizedCommunity = normalizeCommunityFeed(community);

        let merged = normalizedCommunity.slice();
        if(scope === 'mine') merged = normalizedCommunity.filter(item => item.kind === 'mine');
        if(scope === 'community') merged = normalizedCommunity.filter(item => item.kind === 'community');
        merged.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
        lastMergedItems = merged.slice();

        if (countEl) countEl.textContent = `${merged.length} item${merged.length===1?'':'s'}`;
        const frag = document.createDocumentFragment();

        if(!merged.length){
          const empty = document.createElement('div');
          empty.className = 'workout-card feed-card empty';
          empty.textContent = 'No feed activity yet.';
          frag.appendChild(empty);
          if (listEl) listEl.replaceChildren(frag);
          return;
        }

        merged.forEach(p => {
          const card = document.createElement('div');
          card.className = `workout-card feed-card ${p.kind === 'mine' ? 'is-mine' : 'is-community'}`;
          if(p.sourceKind === 'community-workout' || p.kind === 'community'){
            card.tabIndex = 0;
            card.setAttribute('role', 'button');
            card.setAttribute('aria-label', `Open ${p.title || 'workout'} by ${p.owner || 'member'}`);
          }

          const top = document.createElement('div');
          top.className = 'feed-card-top';

          const avatar = document.createElement('button');
          avatar.type = 'button';
          avatar.className = `feed-avatar ${p.kind === 'mine' ? 'mine' : 'community'} feed-profile-trigger`;
          avatar.title = 'Open profile';
          avatar.textContent = (p.owner || 'M').slice(0, 1).toUpperCase();
          top.appendChild(avatar);

          const heading = document.createElement('div');
          heading.className = 'feed-heading';

          const ownerRow = document.createElement('div');
          ownerRow.className = 'feed-owner-row';
          const owner = document.createElement('button');
          owner.type = 'button';
          owner.className = 'feed-owner feed-profile-trigger';
          owner.title = 'Open profile';
          owner.textContent = p.kind === 'mine' ? 'You' : (p.owner || 'Member');
          ownerRow.appendChild(owner);

          const sourceBadge = document.createElement('span');
          sourceBadge.className = `feed-source ${p.kind === 'mine' ? 'mine' : 'community'}`;
          sourceBadge.textContent = p.kind === 'mine'
            ? (p.sourceKind === 'local-post' ? 'Your Post' : 'Your Workout')
            : 'Others Post';
          ownerRow.appendChild(sourceBadge);
          heading.appendChild(ownerRow);

          const when = document.createElement('div');
          when.className = 'small muted';
          when.textContent = dtf.format(new Date(p.createdAt || Date.now()));
          heading.appendChild(when);
          top.appendChild(heading);
          card.appendChild(top);

          const h = document.createElement('h3');
          h.textContent = p.title || 'Workout';
          card.appendChild(h);

          const meta = document.createElement('div');
          meta.className = 'feed-meta';
          const s = p.summary || {};
          const parts = [];
          if(p.activityType) parts.push(`Type: ${p.activityType}`);
          if(p.intensity) parts.push(`Effort: ${p.intensity}`);
          if(s.setsCompleted) parts.push(`${s.setsCompleted} sets`);
          if(s.exercisesCompleted) parts.push(`${s.exercisesCompleted} exercises`);
          if(s.durationSeconds) parts.push(`${Math.max(1, Math.round(s.durationSeconds/60))} min`);
          else if(p.source && p.source.duration) parts.push(`${p.source.duration}`);
          if (parts.length) {
            const summary = document.createElement('span');
            summary.className = 'feed-meta-text';
            summary.textContent = parts.join(' • ');
            meta.appendChild(summary);
          }
          card.appendChild(meta);

          if(p.notes){
            const notes = document.createElement('p');
            notes.className = 'small feed-notes';
            notes.textContent = p.notes;
            card.appendChild(notes);
          }

          const descriptionText = p.description || '';
          if(descriptionText){
            const desc = document.createElement('p');
            desc.className = 'small feed-description';
            desc.textContent = descriptionText;
            card.appendChild(desc);
          }

          if(p.photoDataUrl){
            const imgWrap = document.createElement('div');
            imgWrap.className = 'completion-photo-wrap';
            const img = document.createElement('img');
            img.className = 'completion-photo';
            img.alt = p.title ? `${p.title} photo` : 'Completed workout photo';
            img.loading = 'lazy';
            img.decoding = 'async';
            img.src = p.photoDataUrl;
            imgWrap.appendChild(img);
            card.appendChild(imgWrap);
          }

          if(p.kind === 'mine'){
            const actions = document.createElement('div');
            actions.className = 'card-actions';

            const rename = document.createElement('button');
            rename.className = 'btn small';
            rename.textContent = 'Rename';
            rename.addEventListener('click', async function(ev){
              ev.preventDefault(); ev.stopPropagation();
              const next = prompt('Rename this workout post:', p.title || 'Completed Workout');
              const cleaned = String(next || '').trim();
              if(!cleaned) return;
              try {
                const source = p && p.source ? p.source : {};
                const workoutId = source.id || source.sessionId || source.workoutId || source._id || source.uuid || p.workoutId || null;
                const canRenameWorkout = !!(workoutId && p.kind === 'mine' && p.sourceKind !== 'local-post');

                if (canRenameWorkout && window.updateWorkout) {
                  const sourceData = parseWorkoutData(source.data);
                  const existingCompletionPost = (sourceData && typeof sourceData.completionPost === 'object')
                    ? sourceData.completionPost
                    : null;
                  const payload = { title: cleaned };
                  if (existingCompletionPost) {
                    payload.data = {
                      completionPost: Object.assign({}, existingCompletionPost, { title: cleaned })
                    };
                  }
                  await window.updateWorkout(workoutId, payload);
                } else if (window.renameCompletedPost) {
                  window.renameCompletedPost(source.id, cleaned);
                }

                renderPosts({ forceRefresh: true });
              } catch (e) {
                alert((e && e.message) ? e.message : 'Rename failed.');
              }
            });
            actions.appendChild(rename);

            const del = document.createElement('button');
            del.className = 'btn danger small';
            del.textContent = 'Delete';
            del.addEventListener('click', async function(ev){
              ev.preventDefault(); ev.stopPropagation();
              if(!confirm('Delete this post?')) return;
              try {
                const source = p && p.source ? p.source : {};
                const workoutId = source.id || source.sessionId || source.workoutId || source._id || source.uuid || p.workoutId || null;
                const canDeleteWorkout = !!(workoutId && p.kind === 'mine' && p.sourceKind !== 'local-post');

                if (canDeleteWorkout && window.deleteWorkout) {
                  await window.deleteWorkout(workoutId);
                } else if (window.deleteCompletedPost) {
                  window.deleteCompletedPost(source.id);
                }

                renderPosts({ forceRefresh: true });
              } catch (e) {
                alert((e && e.message) ? e.message : 'Delete failed.');
              }
            });
            actions.appendChild(del);

            card.appendChild(actions);
          }

          frag.appendChild(card);
        });

        if (listEl) listEl.replaceChildren(frag);
      }

      if(feedScopeEl){ feedScopeEl.addEventListener('change', function(){ renderPosts({ forceRefresh: false }); }); }

      if(listEl){
        listEl.addEventListener('click', function(ev){
          const target = ev.target.closest('.feed-profile-trigger');
          const card = ev.target.closest('.feed-card');
          if(!card) return;
          const idx = Array.from(listEl.children).indexOf(card);
          if(idx < 0 || idx >= lastMergedItems.length) return;
          const item = lastMergedItems[idx];
          if(target){
            ev.preventDefault();
            ev.stopPropagation();
            openProfileModal(profileForItem(item));
            return;
          }
          if(item && (item.kind === 'community' || item.sourceKind === 'community-workout')){
            openWorkoutDetail(item);
          }
        });

        listEl.addEventListener('keydown', function(ev){
          if(ev.key !== 'Enter' && ev.key !== ' ') return;
          const card = ev.target.closest('.feed-card');
          if(!card) return;
          const idx = Array.from(listEl.children).indexOf(card);
          if(idx < 0 || idx >= lastMergedItems.length) return;
          const item = lastMergedItems[idx];
          if(!item || (item.kind !== 'community' && item.sourceKind !== 'community-workout')) return;
          ev.preventDefault();
          openWorkoutDetail(item);
        });
      }

      renderPosts({ forceRefresh: true });
    })();
    </script>
  </body>
  </html>
