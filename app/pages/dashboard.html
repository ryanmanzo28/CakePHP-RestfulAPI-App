<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>HydraCor Dashboard</title>
        <link rel="stylesheet" href="../assets/main.css?v=4" />
    </head>
    <body class="dashboard-page">
        <header class="dashboard-header">
            <div class="dashboard-header-inner">
                <div class="brand">
                    <div class="logo" aria-hidden="true">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="2" y="2" width="20" height="20" rx="6" />
                            <path d="M7 12h10M7 16h6" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="dashboard-title">HydraCor</h1>
                        <div class="tag">Dashboard</div>
                    </div>
                </div>

                <div class="dashboard-actions">
                    <div class="user-info small">Signed in as <strong id="username"></strong></div>
                    <button id="settingsBtn" class="btn">Settings</button>
                    <button id="logout" class="btn secondary">Logout</button>
                </div>
            </div>
        </header>

        <main class="dashboard-content">
            <div class="dashboard-container dashboard-shell">
                <section class="dash-layout">
                    <div class="dash-main-stack">
                        <section class="dash-hero-card">
                            <header class="dash-hero-head">
                                <p class="dash-eyebrow">Dashboard</p>
                                <h2>Training Overview</h2>
                                <p class="dash-subtitle">Everything you need to review past sessions and start your next workout fast.</p>
                            </header>
                        </section>

                        <section class="dash-toolbar-card">
                            <div class="small muted" id="workoutCount">0 workouts</div>
                            <div class="dash-toolbar-actions">
                                <input id="workoutSearch" class="search" placeholder="Search workouts" />
                            </div>
                        </section>

                        <div id="error" role="alert" class="error"></div>

                        <div class="dash-main-card">
                            <header class="dash-section-head row-between">
                                <h3>Your Workouts</h3>
                                <span class="small muted">Click any card to view details</span>
                            </header>
                            <div class="dashboard-grid">
                                <div id="workoutList" class="workout-list"></div>
                            </div>
                        </div>
                    </div>

                    <aside class="dash-side">
                        <div class="dash-side-card dash-stats-panel">
                            <h3 class="small">Quick Stats</h3>
                            <div class="dash-stats-grid">
                                <div class="dash-stat-card">
                                    <div class="stat-value" id="statTotal">0</div>
                                    <div class="stat-label">Completed</div>
                                </div>
                                <div class="dash-stat-card">
                                    <div class="stat-value" id="statRecent">0</div>
                                    <div class="stat-label">Last 7d</div>
                                </div>
                                <div class="dash-stat-card">
                                    <div class="stat-value" id="statAvg">—</div>
                                    <div class="stat-label">Avg Duration</div>
                                </div>
                            </div>
                        </div>

                        <div class="dash-side-card">
                            <div class="row-between" style="margin-bottom:8px;align-items:center;">
                                <h3 class="small" style="margin:0;border:0;padding:0;">Recent Sessions</h3>
                                <button id="viewAllPast" class="btn small">View All</button>
                            </div>
                            <div id="pastWorkouts" class="past-list"></div>
                        </div>
                    </aside>
                </section>

                <button id="addWorkout" class="btn primary" aria-label="Add Workout">+</button>
            </div>
        </main>

                <!-- Workout detail modal (popout) -->
                <div id="workoutModal" class="modal-overlay" aria-hidden="true">
                    <div class="modal-panel" role="dialog" aria-modal="true" aria-label="Workout details">
                        <button id="modalClose" class="btn small modal-close-btn">Close</button>
                        <h2 id="modalTitle">Workout</h2>
                        <div id="modalMeta" class="small muted"></div>
                        <div id="modalNotes" class="modal-notes"></div>
                        <div id="modalDetails"></div>
                        <div class="modal-actions">
                            <button id="modalStart" class="btn primary">Start Workout</button>
                            <button id="modalEdit" class="btn">Edit</button>
                        </div>
                    </div>
                </div>

                <!-- Settings modal -->
                <div id="settingsModal" class="modal-overlay" aria-hidden="true">
                    <div class="modal-panel" role="dialog" aria-modal="true" aria-label="Settings">
                        <button id="settingsClose" class="btn small modal-close-btn">Close</button>
                        <h2>Settings</h2>
                        <div class="settings-block">
                            <label class="small">Preferred weight unit</label>
                            <div class="settings-radio-row">
                                <label><input type="radio" name="unit" value="lb" /> lb</label>
                                <label><input type="radio" name="unit" value="kg" /> kg</label>
                            </div>
                        </div>
                        <div class="settings-actions">
                            <button id="settingsSave" class="btn primary">Save</button>
                        </div>
                    </div>
                </div>

        <script src="../main.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', async function () {
                const token = (window.getAuthToken && window.getAuthToken()) || localStorage.getItem('jwt') || sessionStorage.getItem('jwt') || '';
                const username = (window.getStoredUsername && window.getStoredUsername()) || localStorage.getItem('username') || sessionStorage.getItem('username') || '';
                if (!token) {
                    window.location.href = '/pages/login.html';
                    return;
                }

                document.getElementById('username').textContent = username;
                document.getElementById('logout').addEventListener('click', function () {
                    if (window.clearAuthStorage) {
                        window.clearAuthStorage();
                    } else {
                        localStorage.removeItem('jwt');
                        localStorage.removeItem('username');
                        localStorage.removeItem('passwordHash');
                        sessionStorage.removeItem('jwt');
                        sessionStorage.removeItem('username');
                        sessionStorage.removeItem('passwordHash');
                    }
                    window.location.href = '/pages/login.html';
                });

                // settings button
                const settingsBtn = document.getElementById('settingsBtn'); if(settingsBtn) settingsBtn.addEventListener('click', function(){ openSettings(); });
                const settingsClose = document.getElementById('settingsClose'); if(settingsClose) settingsClose.addEventListener('click', function(){ closeSettings(); });
                const settingsSave = document.getElementById('settingsSave'); if(settingsSave) settingsSave.addEventListener('click', function(){ saveSettings(); });
                const viewAllPast = document.getElementById('viewAllPast'); if(viewAllPast) viewAllPast.addEventListener('click', function(){ window.location.href = '/pages/past_workouts.html'; });

                // Ensure add button always navigates to add page, even if later code errors
                const earlyAddBtn = document.getElementById('addWorkout');
                if (earlyAddBtn) {
                    earlyAddBtn.addEventListener('click', () => {
                        try {
                            if (document.startViewTransition) {
                                document.startViewTransition(() => { window.location.href = '/pages/addworkout.html'; }).catch(()=>{});
                            } else {
                                window.location.href = '/pages/addworkout.html';
                            }
                        } catch (err) {
                            window.location.href = '/pages/addworkout.html';
                        }
                    });
                }

                const list = document.getElementById('workoutList');
                const countEl = document.getElementById('workoutCount');
                const searchInput = document.getElementById('workoutSearch');
                let latestWorkouts = [];

                function formatDuration(d) {
                    if (d === null || d === undefined || d === '') return '';
                    if (typeof d === 'number') {
                        const m = Math.max(0, Math.floor(d));
                        if (m >= 60) { const h = Math.floor(m/60); const mm = m%60; return mm ? `${h}h${mm}m` : `${h}h`; }
                        return `${m}m`;
                    }
                    const s = String(d).trim();
                    if (/^\d+$/.test(s)) return `${s}m`;
                    return s;
                }

                function getWorkoutDataObject(w) {
                    if (!w || w.data === null || w.data === undefined || w.data === '') return null;
                    if (typeof w.data === 'object') return w.data;
                    if (typeof w.data === 'string') {
                        try { return JSON.parse(w.data); } catch (e) { return null; }
                    }
                    return null;
                }

                function getWorkoutCompletionTimestamp(w) {
                    if (!w) return NaN;
                    const data = getWorkoutDataObject(w);
                    const completedAt = data && (data.completedAt || data.completed_at);
                    if (completedAt) {
                        const t = Date.parse(completedAt);
                        if (!isNaN(t)) return t;
                    }
                    return NaN;
                }

                function isWorkoutCompleted(w) {
                    const data = getWorkoutDataObject(w);
                    if (!data) return false;
                    return !!(data.completed || data.completedAt || data.completed_at);
                }

                function renderWorkouts(workouts) {
                    countEl.textContent = `${workouts.length} workout${workouts.length === 1 ? '' : 's'}`;
                    // compute stats
                    const now = Date.now();
                    const sevenDays = 7 * 24 * 60 * 60 * 1000;
                    const completedCount = workouts.filter(isWorkoutCompleted).length;
                    const recentCount = workouts.filter(w => {
                        if (!isWorkoutCompleted(w)) return false;
                        let t = getWorkoutCompletionTimestamp(w);
                        if (isNaN(t) && w.date) t = Date.parse(w.date);
                        if (isNaN(t) && w.created) t = Date.parse(w.created);
                        return !isNaN(t) && (now - t) <= sevenDays;
                    }).length;
                    document.getElementById('statTotal').textContent = completedCount;
                    document.getElementById('statRecent').textContent = recentCount;

                    const durations = workouts.map(w => {
                        if (!w) return 0; return (function(d){ if (d===null||d===undefined||d==='') return 0; if (typeof d==='number') return Math.max(0,Math.floor(d)); const s=String(d); let mins=0; const h=s.match(/(\d+)h/); const m=s.match(/(\d+)m/); if(h) mins+=parseInt(h[1],10)*60; if(m) mins+=parseInt(m[1],10); if(!h&&!m){ const n=parseInt(s,10); if(!isNaN(n)) mins=n; } return mins;})(w.duration);
                    }).filter(n => n > 0);
                    const avgMin = durations.length ? Math.round(durations.reduce((a,b)=>a+b,0)/durations.length) : 0;
                    document.getElementById('statAvg').textContent = avgMin ? `${avgMin}m` : '—';

                    if (!workouts || workouts.length === 0) {
                        list.innerHTML = '';
                        const msg = document.createElement('div');
                        msg.className = 'workout-card';
                        msg.textContent = 'No workouts found. Add your first session.';
                        list.appendChild(msg);
                        return;
                    }

                    const frag = document.createDocumentFragment();
                    for (const w of workouts) {
                        const card = document.createElement('div');
                        card.className = 'workout-card';
                        card.dataset.id = w.id || '';

                        const h = document.createElement('h3');
                        h.textContent = (w.title || w.name || 'Workout');
                        card.appendChild(h);

                        const meta = document.createElement('div');
                        meta.className = 'small muted';
                        const parts = [];
                        if (w.date) parts.push(w.date);
                        const durText = formatDuration(w.duration);
                        if (durText) parts.push(durText);
                        // if server provided distance inside data blob
                        if (w.data && w.data.distance) parts.push(`${w.data.distance}km`);
                        meta.textContent = parts.join(' • ');
                        card.appendChild(meta);

                        const p = document.createElement('p');
                        p.textContent = (w.notes || '');
                        card.appendChild(p);

                        // show structured data if available (exercises, sets, weightUnit, distance)
                        if (w.data) {
                            try {
                                const dd = typeof w.data === 'string' ? JSON.parse(w.data) : w.data;
                                if (dd) {
                                    if (dd.sets) {
                                        const s = document.createElement('div'); s.className='small muted'; s.textContent = `${dd.sets} sets`; card.appendChild(s);
                                    }
                                    if (dd.distance) {
                                        const dnode = document.createElement('div'); dnode.className='small muted'; dnode.textContent = `Distance: ${dd.distance} km`; card.appendChild(dnode);
                                    }
                                    if (Array.isArray(dd.exercises) && dd.exercises.length) {
                                        const ul = document.createElement('ul'); ul.style.margin='8px 0 0'; ul.className='cw-ex-list';
                                        const preferredUnit = window.getWeightUnit ? window.getWeightUnit() : 'lb';
                                        const sourceUnit = (dd && dd.weightUnit) || preferredUnit;
                                        dd.exercises.slice(0,6).forEach(ex => { const li = document.createElement('li'); li.textContent = ex.name + (ex.reps ? ` • ${ex.reps} reps` : '') + (ex.weight ? ` • ${window.formatWeightForDisplay ? window.formatWeightForDisplay(ex.weight, sourceUnit, preferredUnit, { separator: '' }) : `${ex.weight}${sourceUnit || ''}`}` : ''); ul.appendChild(li); });
                                        card.appendChild(ul);
                                    }
                                }
                            } catch (e) { /* ignore parse errors */ }
                        }

                        const actions = document.createElement('div');
                        actions.className = 'card-actions';
                        const del = document.createElement('button');
                        del.className = 'btn danger small';
                        del.textContent = 'Delete';
                        del.addEventListener('click', async function (ev) {
                            console.log('Delete button clicked for workout id=', w.id, 'target=', ev.target);
                            ev.preventDefault(); ev.stopPropagation();
                            if (!confirm('Delete this workout?')) return;
                            const backup = Object.assign({}, w);
                            // Disable delete button while processing
                            del.disabled = true; del.textContent = 'Deleting…';
                            try {
                                await window.deleteWorkout(w.id);
                                await refreshWorkouts();

                                showUndoSnackbar('Workout deleted', 'Undo', async function () {
                                    try {
                                        await window.addWorkout(backup);
                                        await refreshWorkouts();
                                    } catch (e) {
                                        console.error('Undo recreate failed', e);
                                    }
                                });
                            } catch (err) {
                                console.warn('Delete failed', err);
                                document.getElementById('error').textContent = 'Delete failed';
                            } finally {
                                del.disabled = false; del.textContent = 'Delete';
                            }
                        });
                        actions.appendChild(del);
                        // clicking the card opens the workout detail page
                        card.appendChild(actions);
                        card.addEventListener('click', function(ev){
                            ev.preventDefault(); ev.stopPropagation();
                            openWorkoutModal(w, card);
                        });

                        frag.appendChild(card);
                    }
                    list.innerHTML = '';
                    list.appendChild(frag);
                }

                function getFilteredWorkouts(workouts) {
                    const q = ((searchInput && searchInput.value) || '').toLowerCase().trim();
                    if (!q) return (workouts || []).slice();
                    return (workouts || []).filter(w => {
                        const t = (w.title || '').toLowerCase();
                        const n = (w.notes || '').toLowerCase();
                        const ex = w.data && w.data.exercises
                            ? JSON.stringify(w.data.exercises).toLowerCase()
                            : (w.exercises ? JSON.stringify(w.exercises).toLowerCase() : '');
                        return t.includes(q) || n.includes(q) || ex.includes(q);
                    });
                }

                function renderFromCurrentFilter() {
                    const filtered = getFilteredWorkouts(latestWorkouts);
                    renderWorkouts(filtered);
                    renderPastWorkouts(filtered);
                }

                // refreshWorkouts fetches from server, merges optimistic created item, and renders
                async function refreshWorkouts() {
                    const serverWorkouts = await loadWorkouts() || [];
                    let workouts = serverWorkouts.slice();
                    latestWorkouts = workouts.slice();
                    try {
                        const raw = sessionStorage.getItem('hc:newWorkout');
                        if (raw) {
                            const created = JSON.parse(raw);
                            // determine if server already has a matching record (ignore local optimistic ids)
                            const matchedOnServer = serverWorkouts.some(w => {
                                if (!created) return false;
                                // skip local optimistic entry which may be present in serverWorkouts depending on shape
                                if (w && String(w.id || '').startsWith('local-')) return false;
                                try {
                                    const sameTitle = created.title && w.title === created.title;
                                    const sameDuration = String(w.duration || '') === String(created.duration || '');
                                    const sameDate = (w.date || '') === (created.date || '');
                                    return sameTitle && sameDuration && sameDate;
                                } catch (e) { return false; }
                            });
                            if (!matchedOnServer) {
                                // prepend optimistic created item so UI shows detail
                                workouts = [created].concat(workouts);
                            }
                            // remove optimistic marker only when server actually has it or when created is not local
                            if (!created || (!created._local) || matchedOnServer) {
                                sessionStorage.removeItem('hc:newWorkout');
                            }
                        }
                    } catch (e) { /* ignore */ }
                    renderFromCurrentFilter();
                }

                // initial render and a retry to pick up DB-saved items
                try {
                await refreshWorkouts();
                setTimeout(() => { void refreshWorkouts(); }, 1200);

                // add-workout button: navigate to add page (robust to startViewTransition)
                const addBtn = document.getElementById('addWorkout');
                if (addBtn) {
                    addBtn.addEventListener('click', () => {
                        try {
                            if (document.startViewTransition) {
                                document.startViewTransition(() => { window.location.href = '/pages/addworkout.html'; }).catch(()=>{});
                            } else {
                                window.location.href = '/pages/addworkout.html';
                            }
                        } catch (err) {
                            window.location.href = '/pages/addworkout.html';
                        }
                    });
                }

                } catch (e) {
                    document.getElementById('error').textContent = e.message || 'Failed to load workouts';
                }

                // wire search filtering
                if(searchInput){
                    searchInput.addEventListener('input', function(){
                        renderFromCurrentFilter();
                    });
                }

                // simple snackbar helper
                function showUndoSnackbar(text, actionText, onAction) {
                    let sb = document.getElementById('snackbar');
                    if (!sb) {
                        sb = document.createElement('div');
                        sb.id = 'snackbar';
                        sb.className = 'snackbar';
                        const span = document.createElement('div'); span.id = 'snackbarText'; sb.appendChild(span);
                        const btn = document.createElement('button'); btn.className = 'action'; btn.id = 'snackbarAction'; sb.appendChild(btn);
                        document.body.appendChild(sb);
                    }
                    document.getElementById('snackbarText').textContent = text;
                    const actionBtn = document.getElementById('snackbarAction');
                    actionBtn.textContent = actionText;
                    actionBtn.onclick = function () { try { onAction && onAction(); } catch (e) {} sb.classList.add('hide'); };
                    sb.classList.remove('hide');
                    setTimeout(() => { if (sb) sb.classList.add('hide'); }, 6000);
                }

                // Modal helpers
                function openWorkoutModal(w, anchorEl){
                    try { document.body.classList.add('modal-open'); } catch(e){}
                    const modal = document.getElementById('workoutModal');
                    if(!modal) return;
                    document.getElementById('modalTitle').textContent = w.title || w.name || 'Workout';
                    document.getElementById('modalMeta').textContent = (w.date? w.date + ' • ' : '') + (formatDuration(w.duration) || '');
                    document.getElementById('modalNotes').textContent = w.notes || '';
                    const details = document.getElementById('modalDetails'); details.innerHTML = '';
                    const dd = w.data ? (typeof w.data==='string'? JSON.parse(w.data) : w.data) : (w.exercises? { exercises: w.exercises, sets: w.sets } : {});
                    if(dd.sets) { const e=document.createElement('div'); e.className='small muted'; e.textContent = dd.sets + ' sets'; details.appendChild(e); }
                    if(dd.distance) { const e=document.createElement('div'); e.className='small muted'; e.textContent = 'Distance: '+dd.distance+' km'; details.appendChild(e); }
                    if(Array.isArray(dd.exercises)){
                        const preferredUnit = window.getWeightUnit ? window.getWeightUnit() : 'lb';
                        const sourceUnit = (dd && dd.weightUnit) || preferredUnit;
                        const ul = document.createElement('ul'); ul.style.marginTop='8px'; dd.exercises.forEach(ex=>{ const li=document.createElement('li'); li.textContent = ex.name + (ex.reps? ' • '+ex.reps+' reps':'') + (ex.weight? ` • ${window.formatWeightForDisplay ? window.formatWeightForDisplay(ex.weight, sourceUnit, preferredUnit, { separator: '' }) : `${ex.weight}${sourceUnit || ''}`}`:''); ul.appendChild(li); }); details.appendChild(ul);
                    }
                    // animate modal from the clicked card's center
                    modal.setAttribute('aria-hidden','false');
                    const panel = modal.querySelector('.modal-panel');
                    try {
                        const r = anchorEl.getBoundingClientRect();
                        const originX = ((r.left + r.width/2) / window.innerWidth) * 100;
                        const originY = ((r.top + r.height/2) / window.innerHeight) * 100;
                        panel.style.transformOrigin = `${originX}% ${originY}%`;
                    } catch (e) { panel.style.transformOrigin = 'center center'; }
                    modal.classList.add('open');
                    // wire start/edit
                    document.getElementById('modalStart').onclick = function(){ try{ sessionStorage.setItem('hc:currentWorkout', JSON.stringify(w)); }catch(e){} window.location.href = '/pages/workout_session.html'; };
                    document.getElementById('modalEdit').onclick = function(){ try{ sessionStorage.setItem('hc:selectedWorkout', JSON.stringify(w)); }catch(e){} window.location.href='/pages/addworkout.html'; };
                    document.getElementById('modalClose').onclick = closeWorkoutModal;
                }
                function closeWorkoutModal(){ const modal=document.getElementById('workoutModal'); if(!modal) return; modal.classList.remove('open'); modal.setAttribute('aria-hidden','true'); try { document.body.classList.remove('modal-open'); } catch(e){} }

                // Settings modal for user preferences
                function openSettings(){ const modal = document.getElementById('settingsModal'); if(!modal) return; modal.classList.add('open'); modal.setAttribute('aria-hidden','false'); try{ document.body.classList.add('modal-open'); }catch(e){}; const cur = (window.getWeightUnit ? window.getWeightUnit() : 'lb'); const r = modal.querySelector(`input[name="unit"][value="${cur}"]`); if(r) r.checked = true; }
                function closeSettings(){ const modal=document.getElementById('settingsModal'); if(!modal) return; modal.classList.remove('open'); modal.setAttribute('aria-hidden','true'); try{ document.body.classList.remove('modal-open'); }catch(e){} }

                function saveSettings(){ const modal = document.getElementById('settingsModal'); if(!modal) return; const v = modal.querySelector('input[name="unit"]:checked'); const unit = v ? v.value : 'lb'; try{ if (window.setWeightUnit) { window.setWeightUnit(unit); } else { localStorage.setItem('hc:weightUnit', unit); } }catch(e){} closeSettings(); renderPastWorkouts(latestWorkouts); }

                // Past workouts rendering: shows recent completed items with total weight
                function parseNumber(s){ if(s===null||s===undefined) return 0; if(typeof s==='number') return s; const m = String(s).match(/(-?\d+\.?\d*)/); return m? parseFloat(m[1]) : 0; }
                function computeTotalWeightFor(w){ try{
                    const dd = w.data ? (typeof w.data==='string'? JSON.parse(w.data): w.data) : (w.exercises? { exercises: w.exercises } : {});
                    if(!dd || !Array.isArray(dd.exercises)) return 0;
                    let total = 0;
                    for(const ex of dd.exercises){ const reps = parseInt(ex.reps||0,10) || 0; const wt = parseNumber(ex.weight || dd.weight || 0); total += reps * wt; }
                    return total;
                }catch(e){ return 0; } }

                function renderPastWorkouts(workouts){
                    const el = document.getElementById('pastWorkouts'); if(!el) return;
                    const posts = (window.getCompletedPosts ? window.getCompletedPosts() : []).slice().sort((a,b)=>(b.created||0)-(a.created||0));
                    el.innerHTML='';

                    if(posts.length){
                        posts.slice(0, 8).forEach(p => {
                            const card = document.createElement('div'); card.className='past-card';
                            const when = document.createElement('div'); when.className='small muted'; when.textContent = new Date(p.created || Date.now()).toLocaleDateString();
                            const title = document.createElement('div'); title.className='past-title'; title.textContent = p.title || p.workoutTitle || 'Completed Workout';
                            const meta = document.createElement('div'); meta.className='small muted';
                            const s = p.summary || {};
                            const parts = [];
                            if(s.setsCompleted) parts.push(`${s.setsCompleted} sets`);
                            if(s.exercisesCompleted) parts.push(`${s.exercisesCompleted} done`);
                            if(s.durationSeconds) parts.push(`${Math.max(1, Math.round(s.durationSeconds/60))}m`);
                            if(p.workoutTitle) parts.push(`from ${p.workoutTitle}`);
                            meta.textContent = parts.join(' • ');
                            card.appendChild(when); card.appendChild(title); card.appendChild(meta);
                            el.appendChild(card);
                        });
                        return;
                    }

                    // fallback to workout-based rendering if no completed posts yet
                    const sorted = workouts.slice().sort((a,b)=>{ const ta=Date.parse(a.date||a.created||0)||0; const tb=Date.parse(b.date||b.created||0)||0; return tb-ta; });
                    let count = 0;
                    for(const w of sorted){ if(count++>=8) break; const card = document.createElement('div'); card.className='past-card'; const when = document.createElement('div'); when.className='small muted'; when.textContent = w.date || (w.created? new Date(w.created).toLocaleDateString() : ''); card.appendChild(when);
                        const title = document.createElement('div'); title.className='past-title'; title.textContent = w.title || w.name || 'Workout'; card.appendChild(title);
                        const dd = w.data ? (typeof w.data==='string'? JSON.parse(w.data): w.data) : (w.exercises? { exercises: w.exercises, sets: w.sets } : {});
                        const meta = document.createElement('div'); meta.className='small muted'; const parts = [];
                        if(dd && dd.sets) parts.push(`${dd.sets} sets`);
                        if(Array.isArray(dd.exercises) && dd.exercises.length) parts.push(`${dd.exercises.length} exercises`);
                        const total = computeTotalWeightFor(w);
                        const userUnit = window.getWeightUnit ? window.getWeightUnit() : localStorage.getItem('hc:weightUnit');
                        const unit = userUnit || (dd && dd.weightUnit) || 'lb';
                        if(total){
                            const sourceUnit = (dd && dd.weightUnit) || 'lb';
                            let displayTotal = total;
                            if(sourceUnit !== unit){
                                const LB_TO_KG = 0.45359237;
                                if(sourceUnit === 'lb' && unit === 'kg') displayTotal = total * LB_TO_KG;
                                else if(sourceUnit === 'kg' && unit === 'lb') displayTotal = total / LB_TO_KG;
                            }
                            const formatted = (Math.abs(displayTotal - Math.round(displayTotal)) > 0.05) ? displayTotal.toFixed(1) : String(Math.round(displayTotal));
                            parts.push(`Total ${formatted} ${unit}`);
                        }
                        meta.textContent = parts.join(' • ');
                        card.appendChild(meta);
                        el.appendChild(card);
                    }
                    if(sorted.length===0){ el.textContent='No past workouts yet.'; }
                }
            });

            function escapeHtml(s) {
                return String(s || '').replace(/[&<>"']/g, function (c) {
                    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
                });
            }
            
        </script>
    </body>
</html>
