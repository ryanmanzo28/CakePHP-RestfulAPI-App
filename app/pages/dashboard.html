<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HydraCor Dashboard</title>
    <link rel="stylesheet" href="../assets/main.css" />
  </head>
  <body>
    <header style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #eee;">
      <h1 style="margin:0;font-size:1.2rem">HydraCor Dashboard</h1>
      <div>
        <span id="userInfo">Signed in as <strong id="username"></strong></span>
        <button id="logout" style="margin-left:12px;">Logout</button>
      </div>
    </header>

    <main style="max-width:900px;margin:20px auto;padding:0 16px;">
      <section>
        <h2>Your Workouts</h2>
        <ul id="workoutList" style="list-style:none;padding:0;margin:0"></ul>
        <div id="error" role="alert" style="color:#c00;margin-top:8px"></div>
      </section>
    </main>

    <script src="../main.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', async function () {
        const token = localStorage.getItem('jwt') ?? '';
        const username = localStorage.getItem('username') || '';
        if (!token) {
          window.location.href = 'login.html';
          return;
        }

        document.getElementById('username').textContent = username;
        document.getElementById('logout').addEventListener('click', function () {
          localStorage.removeItem('jwt');
          localStorage.removeItem('username');
          localStorage.removeItem('passwordHash');
          window.location.href = 'login.html';
        });

        try {
          const workouts = await loadWorkouts();
          const list = document.getElementById('workoutList');
          if (!workouts || workouts.length === 0) {
            list.innerHTML = '<li>No workouts found.</li>';
          } else {
            list.innerHTML = workouts
              .map(w => `<li style="padding:8px 0;border-bottom:1px solid #f2f2f2;"><strong>${escapeHtml(w.title ?? w.name ?? 'Workout')}</strong><div style="font-size:0.9rem;color:#444">${escapeHtml(w.notes ?? '')}</div></li>`)
              .join('');
          }
        } catch (e) {
          document.getElementById('error').textContent = e.message || 'Failed to load workouts';
        }
      });

      function escapeHtml(s) {
        return String(s || '').replace(/[&<>"']/g, function (c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
      }
    </script>
  </body>
</html>
