<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>HydraCor Dashboard</title>
        <link rel="stylesheet" href="../assets/main.css?v=4" />
    </head>
    <body>
        <header class="dashboard-header">
            <div class="dashboard-header-inner">
                <div class="brand">
                    <div class="logo" aria-hidden="true">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="2" y="2" width="20" height="20" rx="6" />
                            <path d="M7 12h10M7 16h6" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="dashboard-title">HydraCor</h1>
                        <div class="tag">Workout Tracker</div>
                    </div>
                </div>

                <div class="dashboard-actions">
                    <div class="user-info small">Signed in as <strong id="username"></strong></div>
                    <button id="logout" class="btn secondary">Logout</button>
                </div>
            </div>
        </header>

        <main class="dashboard-content">
            <div class="dashboard-container">
                <section class="dashboard-overview">
                    <div class="row-between">
                        <h2>Your Workouts</h2>
                        <div style="display:flex;gap:8px;align-items:center">
                            <div id="workoutCount" class="small muted">0 workouts</div>
                        </div>
                    </div>
                    <div id="error" role="alert" class="error"></div>
                </section>

                <section class="stats-grid" aria-hidden="false">
                    <div class="stat-card">
                        <div class="stat-value" id="statTotal">0</div>
                        <div class="stat-label">Total Workouts</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statRecent">0</div>
                        <div class="stat-label">Last 7 Days</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statAvg">—</div>
                        <div class="stat-label">Avg Duration</div>
                    </div>
                    <button id="addWorkout" class="btn primary" style="margin-top:16px;">+</button>
                </section>

                <div class="dashboard-columns">
                    <section class="main-column">
                        <div class="dashboard-grid">
                            <div id="workoutList" class="workout-list"></div>
                        </div>
                    </section>
                    <aside class="past-column">
                        <h3 class="small">Past Workouts</h3>
                        <div id="pastWorkouts" class="past-list"></div>
                    </aside>
                </div>
            </div>
        </main>

                <!-- Workout detail modal (popout) -->
                <div id="workoutModal" class="modal-overlay" aria-hidden="true">
                    <div class="modal-panel" role="dialog" aria-modal="true" aria-label="Workout details">
                        <button id="modalClose" class="btn small" style="position:absolute;right:12px;top:12px">Close</button>
                        <h2 id="modalTitle">Workout</h2>
                        <div id="modalMeta" class="small muted" style="margin-bottom:6px"></div>
                        <div id="modalNotes" style="margin-bottom:10px;color:#444"></div>
                        <div id="modalDetails"></div>
                        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:12px">
                            <button id="modalStart" class="btn primary">Start Workout</button>
                            <button id="modalEdit" class="btn">Edit</button>
                        </div>
                    </div>
                </div>

        <script src="../main.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', async function () {
                const token = localStorage.getItem('jwt') ?? '';
                const username = localStorage.getItem('username') || '';
                if (!token) {
                    window.location.href = 'login.html';
                    return;
                }

                document.getElementById('username').textContent = username;
                document.getElementById('logout').addEventListener('click', function () {
                    localStorage.removeItem('jwt');
                    localStorage.removeItem('username');
                    localStorage.removeItem('passwordHash');
                    window.location.href = 'login.html';
                });

                // Ensure add button always navigates to add page, even if later code errors
                const earlyAddBtn = document.getElementById('addWorkout');
                if (earlyAddBtn) {
                    earlyAddBtn.addEventListener('click', () => {
                        try {
                            if (document.startViewTransition) {
                                document.startViewTransition(() => { window.location.href = 'addworkout.html'; }).catch(()=>{});
                            } else {
                                window.location.href = 'addworkout.html';
                            }
                        } catch (err) {
                            window.location.href = 'addworkout.html';
                        }
                    });
                }

                const list = document.getElementById('workoutList');
                const countEl = document.getElementById('workoutCount');

                function formatDuration(d) {
                    if (d === null || d === undefined || d === '') return '';
                    if (typeof d === 'number') {
                        const m = Math.max(0, Math.floor(d));
                        if (m >= 60) { const h = Math.floor(m/60); const mm = m%60; return mm ? `${h}h${mm}m` : `${h}h`; }
                        return `${m}m`;
                    }
                    const s = String(d).trim();
                    if (/^\d+$/.test(s)) return `${s}m`;
                    return s;
                }

                function renderWorkouts(workouts) {
                    countEl.textContent = `${workouts.length} workout${workouts.length === 1 ? '' : 's'}`;
                    // compute stats
                    const now = Date.now();
                    const sevenDays = 7 * 24 * 60 * 60 * 1000;
                    const recentCount = workouts.filter(w => {
                        if (!w.date) return false;
                        const t = Date.parse(w.date);
                        return !isNaN(t) && (now - t) <= sevenDays;
                    }).length;
                    document.getElementById('statTotal').textContent = workouts.length;
                    document.getElementById('statRecent').textContent = recentCount;

                    const durations = workouts.map(w => {
                        if (!w) return 0; return (function(d){ if (d===null||d===undefined||d==='') return 0; if (typeof d==='number') return Math.max(0,Math.floor(d)); const s=String(d); let mins=0; const h=s.match(/(\d+)h/); const m=s.match(/(\d+)m/); if(h) mins+=parseInt(h[1],10)*60; if(m) mins+=parseInt(m[1],10); if(!h&&!m){ const n=parseInt(s,10); if(!isNaN(n)) mins=n; } return mins;})(w.duration);
                    }).filter(n => n > 0);
                    const avgMin = durations.length ? Math.round(durations.reduce((a,b)=>a+b,0)/durations.length) : 0;
                    document.getElementById('statAvg').textContent = avgMin ? `${avgMin}m` : '—';

                    if (!workouts || workouts.length === 0) {
                        list.innerHTML = '';
                        const msg = document.createElement('div');
                        msg.className = 'workout-card';
                        msg.textContent = 'No workouts found. Add your first session.';
                        list.appendChild(msg);
                        return;
                    }

                    const frag = document.createDocumentFragment();
                    for (const w of workouts) {
                        const card = document.createElement('div');
                        card.className = 'workout-card';
                        card.dataset.id = w.id || '';

                        const h = document.createElement('h3');
                        h.textContent = (w.title || w.name || 'Workout');
                        card.appendChild(h);

                        const meta = document.createElement('div');
                        meta.className = 'small muted';
                        const parts = [];
                        if (w.date) parts.push(w.date);
                        const durText = formatDuration(w.duration);
                        if (durText) parts.push(durText);
                        // if server provided distance inside data blob
                        if (w.data && w.data.distance) parts.push(`${w.data.distance}km`);
                        meta.textContent = parts.join(' • ');
                        card.appendChild(meta);

                        const p = document.createElement('p');
                        p.textContent = (w.notes || '');
                        card.appendChild(p);

                        // show structured data if available (exercises, sets, weightUnit, distance)
                        if (w.data) {
                            try {
                                const dd = typeof w.data === 'string' ? JSON.parse(w.data) : w.data;
                                if (dd) {
                                    if (dd.sets) {
                                        const s = document.createElement('div'); s.className='small muted'; s.textContent = `${dd.sets} sets`; card.appendChild(s);
                                    }
                                    if (dd.distance) {
                                        const dnode = document.createElement('div'); dnode.className='small muted'; dnode.textContent = `Distance: ${dd.distance} km`; card.appendChild(dnode);
                                    }
                                    if (Array.isArray(dd.exercises) && dd.exercises.length) {
                                        const ul = document.createElement('ul'); ul.style.margin='8px 0 0'; ul.className='cw-ex-list';
                                        dd.exercises.slice(0,6).forEach(ex => { const li = document.createElement('li'); li.textContent = ex.name + (ex.reps ? ` • ${ex.reps} reps` : '') + (ex.weight ? ` • ${ex.weight}${dd.weightUnit||''}` : ''); ul.appendChild(li); });
                                        card.appendChild(ul);
                                    }
                                }
                            } catch (e) { /* ignore parse errors */ }
                        }

                        const actions = document.createElement('div');
                        actions.className = 'card-actions';
                        const del = document.createElement('button');
                        del.className = 'btn danger small';
                        del.textContent = 'Delete';
                        del.addEventListener('click', async function (ev) {
                            console.log('Delete button clicked for workout id=', w.id, 'target=', ev.target);
                            ev.preventDefault(); ev.stopPropagation();
                            if (!confirm('Delete this workout?')) return;
                            const backup = Object.assign({}, w);
                            // Disable delete button while processing
                            del.disabled = true; del.textContent = 'Deleting…';
                            try {
                                await window.deleteWorkout(w.id);
                                // remove card after server confirms
                                if (card && card.parentNode) card.parentNode.removeChild(card);
                                const newCount = Math.max(0, parseInt(workouts.length, 10) - 1);
                                countEl.textContent = `${newCount} workout${newCount === 1 ? '' : 's'}`;

                                showUndoSnackbar('Workout deleted', 'Undo', async function () {
                                    try {
                                        const recreated = await window.addWorkout(backup);
                                        const list = document.getElementById('workoutList');
                                        const newCard = document.createElement('div');
                                        newCard.className = 'workout-card';
                                        const hh = document.createElement('h3'); hh.textContent = recreated.title || backup.title; newCard.appendChild(hh);
                                        const pp = document.createElement('p'); pp.textContent = recreated.notes || backup.notes || ''; newCard.appendChild(pp);
                                        list.insertBefore(newCard, list.firstChild);
                                        const cur = parseInt((countEl.textContent || '0').split(' ')[0], 10) || 0;
                                        countEl.textContent = `${cur + 1} workout${cur + 1 === 1 ? '' : 's'}`;
                                    } catch (e) {
                                        console.error('Undo recreate failed', e);
                                    }
                                });
                            } catch (err) {
                                console.warn('Delete failed', err);
                                document.getElementById('error').textContent = 'Delete failed';
                            } finally {
                                del.disabled = false; del.textContent = 'Delete';
                            }
                        });
                        actions.appendChild(del);
                        // clicking the card opens the workout detail page
                        card.appendChild(actions);
                        card.addEventListener('click', function(ev){
                            ev.preventDefault(); ev.stopPropagation();
                            openWorkoutModal(w, card);
                        });

                        frag.appendChild(card);
                    }
                    list.innerHTML = '';
                    list.appendChild(frag);
                }

                // refreshWorkouts fetches from server, merges optimistic created item, and renders
                async function refreshWorkouts() {
                    const serverWorkouts = await loadWorkouts() || [];
                    let workouts = serverWorkouts.slice();
                    try {
                        const raw = sessionStorage.getItem('hc:newWorkout');
                        if (raw) {
                            const created = JSON.parse(raw);
                            // determine if server already has a matching record (ignore local optimistic ids)
                            const matchedOnServer = serverWorkouts.some(w => {
                                if (!created) return false;
                                // skip local optimistic entry which may be present in serverWorkouts depending on shape
                                if (w && String(w.id || '').startsWith('local-')) return false;
                                try {
                                    const sameTitle = created.title && w.title === created.title;
                                    const sameDuration = String(w.duration || '') === String(created.duration || '');
                                    const sameDate = (w.date || '') === (created.date || '');
                                    return sameTitle && sameDuration && sameDate;
                                } catch (e) { return false; }
                            });
                            if (!matchedOnServer) {
                                // prepend optimistic created item so UI shows detail
                                workouts = [created].concat(workouts);
                            }
                            // remove optimistic marker only when server actually has it or when created is not local
                            if (!created || (!created._local) || matchedOnServer) {
                                sessionStorage.removeItem('hc:newWorkout');
                            }
                        }
                    } catch (e) { /* ignore */ }
                    renderWorkouts(workouts);
                    renderPastWorkouts(workouts);
                }

                // initial render and a retry to pick up DB-saved items
                try {
                await refreshWorkouts();
                setTimeout(() => { void refreshWorkouts(); }, 1200);

                // add-workout button: navigate to add page (robust to startViewTransition)
                const addBtn = document.getElementById('addWorkout');
                if (addBtn) {
                    addBtn.addEventListener('click', () => {
                        try {
                            if (document.startViewTransition) {
                                document.startViewTransition(() => { window.location.href = 'addworkout.html'; }).catch(()=>{});
                            } else {
                                window.location.href = 'addworkout.html';
                            }
                        } catch (err) {
                            window.location.href = 'addworkout.html';
                        }
                    });
                }

                } catch (e) {
                    document.getElementById('error').textContent = e.message || 'Failed to load workouts';
                }

                // simple snackbar helper
                function showUndoSnackbar(text, actionText, onAction) {
                    let sb = document.getElementById('snackbar');
                    if (!sb) {
                        sb = document.createElement('div');
                        sb.id = 'snackbar';
                        sb.className = 'snackbar';
                        const span = document.createElement('div'); span.id = 'snackbarText'; sb.appendChild(span);
                        const btn = document.createElement('button'); btn.className = 'action'; btn.id = 'snackbarAction'; sb.appendChild(btn);
                        document.body.appendChild(sb);
                    }
                    document.getElementById('snackbarText').textContent = text;
                    const actionBtn = document.getElementById('snackbarAction');
                    actionBtn.textContent = actionText;
                    actionBtn.onclick = function () { try { onAction && onAction(); } catch (e) {} sb.classList.add('hide'); };
                    sb.classList.remove('hide');
                    setTimeout(() => { if (sb) sb.classList.add('hide'); }, 6000);
                }

                // Modal helpers
                function openWorkoutModal(w, anchorEl){
                    try { document.body.classList.add('modal-open'); } catch(e){}
                    const modal = document.getElementById('workoutModal');
                    if(!modal) return;
                    document.getElementById('modalTitle').textContent = w.title || w.name || 'Workout';
                    document.getElementById('modalMeta').textContent = (w.date? w.date + ' • ' : '') + (formatDuration(w.duration) || '');
                    document.getElementById('modalNotes').textContent = w.notes || '';
                    const details = document.getElementById('modalDetails'); details.innerHTML = '';
                    const dd = w.data ? (typeof w.data==='string'? JSON.parse(w.data) : w.data) : (w.exercises? { exercises: w.exercises, sets: w.sets } : {});
                    if(dd.sets) { const e=document.createElement('div'); e.className='small muted'; e.textContent = dd.sets + ' sets'; details.appendChild(e); }
                    if(dd.distance) { const e=document.createElement('div'); e.className='small muted'; e.textContent = 'Distance: '+dd.distance+' km'; details.appendChild(e); }
                    if(Array.isArray(dd.exercises)){
                        const ul = document.createElement('ul'); ul.style.marginTop='8px'; dd.exercises.forEach(ex=>{ const li=document.createElement('li'); li.textContent = ex.name + (ex.reps? ' • '+ex.reps+' reps':'') + (ex.weight? ' • '+ex.weight+(dd.weightUnit||''):''); ul.appendChild(li); }); details.appendChild(ul);
                    }
                    // animate modal from the clicked card's center
                    modal.setAttribute('aria-hidden','false');
                    const panel = modal.querySelector('.modal-panel');
                    try {
                        const r = anchorEl.getBoundingClientRect();
                        const originX = ((r.left + r.width/2) / window.innerWidth) * 100;
                        const originY = ((r.top + r.height/2) / window.innerHeight) * 100;
                        panel.style.transformOrigin = `${originX}% ${originY}%`;
                    } catch (e) { panel.style.transformOrigin = 'center center'; }
                    modal.classList.add('open');
                    // wire start/edit
                    document.getElementById('modalStart').onclick = function(){ try{ sessionStorage.setItem('hc:currentWorkout', JSON.stringify(w)); }catch(e){} window.location.href = 'workout_session.html'; };
                    document.getElementById('modalEdit').onclick = function(){ try{ sessionStorage.setItem('hc:selectedWorkout', JSON.stringify(w)); }catch(e){} window.location.href='addworkout.html'; };
                    document.getElementById('modalClose').onclick = closeWorkoutModal;
                }
                function closeWorkoutModal(){ const modal=document.getElementById('workoutModal'); if(!modal) return; modal.classList.remove('open'); modal.setAttribute('aria-hidden','true'); try { document.body.classList.remove('modal-open'); } catch(e){} }

                // Past workouts rendering: shows recent completed items with total weight
                function parseNumber(s){ if(s===null||s===undefined) return 0; if(typeof s==='number') return s; const m = String(s).match(/(-?\d+\.?\d*)/); return m? parseFloat(m[1]) : 0; }
                function computeTotalWeightFor(w){ try{
                    const dd = w.data ? (typeof w.data==='string'? JSON.parse(w.data): w.data) : (w.exercises? { exercises: w.exercises } : {});
                    if(!dd || !Array.isArray(dd.exercises)) return 0;
                    let total = 0;
                    for(const ex of dd.exercises){ const reps = parseInt(ex.reps||0,10) || 0; const wt = parseNumber(ex.weight || dd.weight || 0); total += reps * wt; }
                    return total;
                }catch(e){ return 0; } }

                function renderPastWorkouts(workouts){
                    const el = document.getElementById('pastWorkouts'); if(!el) return;
                    // sort by date desc (most recent first); fallback to created
                    const sorted = workouts.slice().sort((a,b)=>{ const ta=Date.parse(a.date||a.created||0)||0; const tb=Date.parse(b.date||b.created||0)||0; return tb-ta; });
                    el.innerHTML='';
                    const max = 8;
                    let count = 0;
                    for(const w of sorted){ if(count++>=max) break; const card = document.createElement('div'); card.className='past-card'; const when = document.createElement('div'); when.className='small muted'; when.textContent = w.date || (w.created? new Date(w.created).toLocaleDateString() : ''); card.appendChild(when);
                        const title = document.createElement('div'); title.className='past-title'; title.textContent = w.title || w.name || 'Workout'; card.appendChild(title);
                        const dd = w.data ? (typeof w.data==='string'? JSON.parse(w.data): w.data) : (w.exercises? { exercises: w.exercises, sets: w.sets } : {});
                        const meta = document.createElement('div'); meta.className='small muted'; const parts = [];
                        if(dd && dd.sets) parts.push(`${dd.sets} sets`);
                        if(Array.isArray(dd.exercises) && dd.exercises.length) parts.push(`${dd.exercises.length} exercises`);
                        const total = computeTotalWeightFor(w);
                        if(total) parts.push(`Total ${total}${(dd && dd.weightUnit)? dd.weightUnit : ' lb'}`);
                        meta.textContent = parts.join(' • ');
                        card.appendChild(meta);
                        el.appendChild(card);
                    }
                    if(sorted.length===0){ el.textContent='No past workouts yet.'; }
                }
            });

            function escapeHtml(s) {
                return String(s || '').replace(/[&<>"']/g, function (c) {
                    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
                });
            }
            
        </script>
    </body>
</html>
